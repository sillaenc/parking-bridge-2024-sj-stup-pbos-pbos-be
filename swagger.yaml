                    type: string
        '500':
          description: 서버 오류

  /api/v1/monitoring/errors:
    get:
      tags: [system]
      summary: 현재 오류 상태 조회
      description: 시스템에서 발생한 오류 목록을 조회합니다.
      responses:
        '200':
          description: 오류 상태 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: string
                      error_count:
                        type: integer
                  timestamp:
                    type: string
        '500':
          description: 서버 오류
    post:
      tags: [system]
      summary: 오류 보고
      description: 새로운 오류를 시스템에 보고합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [error]
              properties:
                error:
                  type: string
                  description: 오류 메시지
                  example: "Database connection timeout"
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                  description: 오류 심각도
                component:
                  type: string
                  description: 오류 발생 컴포넌트
      responses:
        '200':
          description: 오류 보고 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                  timestamp:
                    type: string
        '400':
          description: 잘못된 요청
        '500':
          description: 서버 오류
    delete:
      tags: [system]
      summary: 오류 목록 초기화
      description: 시스템의 오류 목록을 초기화합니다.
      responses:
        '200':
          description: 오류 목록 초기화 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      cleared_count:
                        type: integer
                  timestamp:
                    type: string
        '500':
