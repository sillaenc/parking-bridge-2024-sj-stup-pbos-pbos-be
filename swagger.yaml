openapi: 3.0.3
info:
  title: 스마트 파킹 백엔드 API
  description: |
    ## 🎯 **80+ 실제 구현된 API 엔드포인트 문서**
    
    이 문서는 실제 구현된 API만을 포함하며, 2025년 9월 24일 기준으로 테스트 완료된 엔드포인트들입니다.
    
    ### 📊 카테고리별 API 분포 (실제 구현됨)
    - **인증 (Auth)**: 7개 - 로그인, 토큰 관리, 주차장 기본 정보
    - **사용자 관리 (Users)**: 9개 - 계정 생성, 수정, 삭제, 비밀번호 관리
    - **파일 관리 (Files)**: 13개 - 파일 업로드, 주차 구역 관리, 동기화 (500MB 지원)
    - **통계 (Statistics)**: 13개 - 일일/주간/월간/연간 통계 분석, 그래프 데이터
    - **전광판 (Electric Signs)**: 9개 - 전광판 제어 및 관리
    - **주차장 기본 정보 (Base Info)**: 7개 - 주차장 기본 설정
    - **데이터베이스 관리 (Database)**: 6개 - DB 설정, 연결 테스트
    - **카메라 주차 (Camera Parking)**: 6개 - 카메라 표면 관리
    - **차량 정보 (Vehicle)**: 4개 - 차량 위치 및 상태 조회
    - **디스플레이 (Display)**: 3개 - 디스플레이 제어
    - **광고판 (Billboard)**: 4개 - 광고판 관리
    - **중앙 대시보드 (Central)**: 2개 - 통합 현황
    - **LED 계산 (LED)**: 4개 - LED 색상 계산
    - **시스템 모니터링 (System)**: 11개 - 상태 확인, 오류 관리
    - **리소스 관리 (Resources)**: 7개 - 주차장 리소스 관리
    - **엔진 데이터**: 3개 - 실시간 데이터 처리
    
    ## 🔧 기술 스택
    - **백엔드**: Dart (shelf 프레임워크)
    - **데이터베이스**: SQLite (ws4sqlite 통신)
    - **인증**: JWT Bearer Token
    - **파일 저장**: Local File System (최대 500MB 지원)
    - **아키텍처**: 3계층 구조 (모델-서비스-API)
    
    ## 📁 파일 관리 기능
    - **지원 형식**: 이미지, 비디오, 문서, 데이터, 압축 파일 (25+ 확장자)
    - **최대 크기**: 500MB per file
    - **동기화**: 파일시스템-DB 양방향 동기화
    - **메타데이터**: 파일 크기, 타입, 카테고리, MIME 타입 관리
    
  version: 2.2.0
  contact:
    name: 스마트 파킹 시스템 지원팀
  license:
    name: MIT

security:
  - BearerAuth: []

tags:
  - name: auth
    description: 인증 및 토큰 관리 (7개 엔드포인트)
  - name: users
    description: 사용자 계정 관리 (9개 엔드포인트)
  - name: parking-zones
    description: 주차 구역 관리 (7개 엔드포인트) - 파일 업로드/수정/삭제, 500MB 지원
  - name: parking-lots
    description: 주차 공간 관리 (4개 엔드포인트) - 개별 공간 유형/상태 변경
  - name: files
    description: 파일 시스템 관리 (4개 엔드포인트) - 순수 파일 시스템 작업
  - name: statistics
    description: 통계 데이터 분석 (13개 엔드포인트)
  - name: electric-signs
    description: 전광판 제어 및 관리 (9개 엔드포인트)
  - name: base-info
    description: 주차장 기본 정보 관리 (7개 엔드포인트)
  - name: database
    description: 데이터베이스 관리 (6개 엔드포인트)
  - name: camera-parking
    description: 카메라 주차 관리 (6개 엔드포인트)
  - name: vehicle
    description: 차량 정보 및 위치 조회 (4개 엔드포인트)
  - name: display
    description: 디스플레이 제어 (3개 엔드포인트)
  - name: billboard
    description: 광고판 관리 (4개 엔드포인트)
  - name: central
    description: 중앙 대시보드 (2개 엔드포인트)
  - name: led
    description: LED 계산 (4개 엔드포인트)
  - name: system
    description: 시스템 모니터링 (11개 엔드포인트)
  - name: resources
    description: 리소스 관리 (7개 엔드포인트)
  - name: engine
    description: 엔진 데이터 처리 (3개 엔드포인트)

paths:
  # ======== 1. 인증 API (7개) ========
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 사용자 로그인
      description: 계정 정보로 로그인하여 JWT 토큰을 발급받습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, passwd]
              properties:
                account:
                  type: string
                  description: 사용자 계정
                  example: "admin"
                passwd:
                  type: string
                  description: 비밀번호
                  example: "password123"
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 로그인 실패 (잘못된 계정 정보)

  /api/v1/auth/base-info:
    get:
      tags: [auth]
      summary: 기본 정보 조회
      description: 로그인 후 주차장 기본 정보를 조회합니다.
      responses:
        '200':
          description: 기본 정보 조회 성공

  /api/v1/auth/token:
    get:
      tags: [auth]
      summary: 토큰 정보 조회
      responses:
        '200':
          description: 토큰 정보

  /api/v1/auth/protected:
    get:
      tags: [auth]
      summary: 보호된 엔드포인트 테스트
      responses:
        '200':
          description: 인증 성공

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: 토큰 갱신
      responses:
        '200':
          description: 토큰 갱신 성공

  /api/v1/auth/health:
    get:
      tags: [auth]
      summary: 인증 서비스 상태 확인
      description: 인증 서비스와 데이터베이스 연결 상태를 확인합니다.
      responses:
        '200':
          description: 서비스 정상
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  database:
                    type: string
                    example: "connected"
                  responseTimeMs:
                    type: integer
                    example: 2
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: "AuthService"
                  jwtService:
                    type: object
        '503':
          description: 서비스 이용 불가 (데이터베이스 연결 실패 등)

  /api/v1/auth/info:
    get:
      tags: [auth]
      summary: 인증 서비스 정보
      description: 인증 서비스의 상세 정보와 지원 기능을 조회합니다.
      responses:
        '200':
          description: 서비스 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Service information retrieved"
                  data:
                    type: object
                    properties:
                      service:
                        type: string
                        example: "AuthService"
                      version:
                        type: string
                        example: "1.0.0"
                      description:
                        type: string
                        example: "Authentication and authorization service"
                      endpoints:
                        type: object
                      passwordHashing:
                        type: string
                        example: "Double SHA256 (legacy compatibility)"
                      tokenManagement:
                        type: object

  # ======== 2. 사용자 관리 API (9개) ========
  /api/v1/users:
    get:
      tags: [users]
      summary: 모든 사용자 조회
      responses:
        '200':
          description: 사용자 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
    post:
      tags: [users]
      summary: 새 사용자 생성
      description: 새로운 사용자 계정을 생성합니다
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 사용자 생성 성공
        '400':
          description: 잘못된 요청 (필수 필드 누락, 비밀번호 불일치 등)
        '409':
          description: 계정이 이미 존재함

  /api/v1/users/{account}:
    get:
      tags: [users]
      summary: 특정 사용자 조회
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 사용자 정보
    put:
      tags: [users]
      summary: 사용자 정보 수정
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 사용자 정보 수정 성공
        '404':
          description: 사용자를 찾을 수 없음
    delete:
      tags: [users]
      summary: 사용자 삭제
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 성공

  /api/v1/users/{account}/password:
    patch:
      tags: [users]
      summary: 비밀번호 변경
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 비밀번호 변경 성공
        '400':
          description: 잘못된 요청 (비밀번호 불일치, 형식 오류 등)
        '401':
          description: 현재 비밀번호가 틀림
        '404':
          description: 사용자를 찾을 수 없음

  /api/v1/users/{account}/password/reset:
    patch:
      tags: [users]
      summary: 비밀번호 초기화
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 비밀번호 초기화 성공

  /api/v1/users/health:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 상태
      description: 사용자 관리 서비스와 데이터베이스 상태를 확인합니다.
      responses:
        '200':
          description: 서비스 정상
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  dbUrl:
                    type: string
                    example: "configured"
                  userCount:
                    type: integer
                    example: 2
                  timestamp:
                    type: string
                    format: date-time
        '500':
          description: 서비스 상태 확인 실패

  /api/v1/users/info:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 정보
      description: 사용자 관리 서비스의 상세 정보와 사용 가능한 엔드포인트를 조회합니다.
      responses:
        '200':
          description: 서비스 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: "User Management API"
                  version:
                    type: string
                    example: "1.0.0"
                  description:
                    type: string
                    example: "RESTful API for user account management"
                  endpoints:
                    type: object
                    properties:
                      "GET /":
                        type: string
                        example: "Get all users"
                      "GET /{account}":
                        type: string
                        example: "Get user by account"
                      "POST /":
                        type: string
                        example: "Create new user"
                      "PUT /{account}":
                        type: string
                        example: "Update user information"
                      "PATCH /{account}/password":
                        type: string
                        example: "Change user password"
                      "PATCH /{account}/password/reset":
                        type: string
                        example: "Reset user password to default"
                      "DELETE /{account}":
                        type: string
                        example: "Delete user account"
                      "GET /health":
                        type: string
                        example: "Service health check"
                      "GET /info":
                        type: string
                        example: "Service information"
                  timestamp:
                    type: string
                    format: date-time

  # ======== 3. 파일 시스템 관리 API (4개) ========
  /api/v1/files:
    get:
      tags: [files]
      summary: 파일 시스템 파일 목록 조회
      description: 실제 파일 시스템에 존재하는 모든 파일들을 조회합니다
      responses:
        '200':
          description: 파일 시스템 파일 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Files retrieved successfully"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                          example: "enhanced_video_zone"
                        fullPath:
                          type: string
                          example: "file/enhanced_video_zone.mp4"
                        extension:
                          type: string
                          example: "mp4"
                        sizeBytes:
                          type: integer
                          example: 36
                        createdAt:
                          type: string
                          format: date-time
                          example: "2025-09-23T13:05:43.339"
                        modifiedAt:
                          type: string
                          format: date-time
                          example: "2025-09-23T13:05:43.339"
        '500':
          description: 내부 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Internal server error"
                  error:
                    type: string

  /api/v1/files/sync:
    post:
      tags: [files]
      summary: 수동 파일시스템 동기화
      description: |
        파일시스템과 데이터베이스 간의 수동 동기화를 실행합니다:
        - 파일시스템에 없는 DB 레코드 정리 (고아 레코드 삭제)
        - DB에 없는 파일시스템 파일들을 DB에 추가
      responses:
        '200':
          description: 동기화 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "파일시스템 동기화가 완료되었습니다."
                  syncedFiles:
                    type: integer
                    example: 15
                  cleanedRecords:
                    type: integer
                    example: 3
        '500':
          description: 내부 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Internal server error"
                  error:
                    type: string

  /api/v1/files/health:
    get:
      tags: [files]
      summary: 파일시스템 상태 확인
      description: 파일시스템과 데이터베이스 간의 일관성 상태를 확인합니다
      responses:
        '200':
          description: 파일시스템 상태 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  totalFiles:
                    type: integer
                    example: 25
                  dbRecords:
                    type: integer
                    example: 25
                  syncStatus:
                    type: string
                    example: "synchronized"
                  lastSyncTime:
                    type: string
                    format: date-time
                  directories:
                    type: object
                  timestamp:
                    type: string
                    format: date-time
        '500':
          description: 파일시스템 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "unhealthy"
                  error:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/files/info:
    get:
      tags: [files]
      summary: 파일 시스템 관리 서비스 정보
      description: 파일 시스템 API의 서비스 정보 및 지원 기능을 조회합니다
      responses:
        '200':
          description: 서비스 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: "File System Management API"
                  version:
                    type: string
                    example: "1.0.0"
                  description:
                    type: string
                    example: "RESTful API for file system operations and synchronization"
                  endpoints:
                    type: object
                  supportedDirectories:
                    type: array
                    items:
                      type: string
                  supportedFileTypes:
                    type: array
                    items:
                      type: string
                  maxFileSize:
                    type: string
                    example: "500MB"
                  features:
                    type: array
                    items:
                      type: string
                  timestamp:
                    type: string
                    format: date-time
  # ======== 4. 데이터베이스 관리 API (6개) ========
  /api/v1/settings/database/config:
    get:
      tags: [database]
      summary: 데이터베이스 설정 조회
      description: 현재 엔진 DB 및 디스플레이 DB 설정을 조회합니다.
      responses:
        '200':
          description: 데이터베이스 설정 조회 성공
        '503':
          description: 데이터베이스 주소가 설정되지 않음
    put:
      tags: [database]
      summary: 전체 데이터베이스 설정 업데이트
      description: 엔진 DB 및 디스플레이 DB 설정을 일괄 업데이트합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                engineDb:
                  type: string
                  description: 엔진 DB URL
                displayDb:
                  type: string
                  description: 디스플레이 DB URL
      responses:
        '200':
          description: 데이터베이스 설정 업데이트 성공
        '400':
          description: 잘못된 요청 데이터
        '503':
          description: 데이터베이스 연결 실패

  /api/v1/settings/database/engine:
    put:
      tags: [database]
      summary: 엔진 DB 설정 업데이트
