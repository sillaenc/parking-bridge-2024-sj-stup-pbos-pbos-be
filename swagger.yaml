components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BaseInformation:
      type: object
      properties:
        parkingLotName:
          type: string
          description: 주차장 이름
        address:
          type: string
          description: 주차장 주소
        totalSpaces:
          type: integer
          description: 총 주차 공간 수
        availableSpaces:
          type: integer
          description: 사용 가능한 주차 공간 수
        contact:
          type: string
          description: 연락처

    ApiResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
        errorCode:
          type: string

    ParkingZone:
      type: object
      properties:
        uid:
          type: integer
        parking_name:
          type: string
        file_address:
          type: string
        floor:
          type: string

    Camera:
      type: object
      properties:
        uid:
          type: integer
        tag:
          type: string
        engine_code:
          type: string
        uri:
          type: string

    ElectricSign:
      type: object
      properties:
        uid:
          type: integer
        parking_lot:
          type: string

    VehicleInfo:
      type: object
      properties:
        tag:
          type: string
        plate:
          type: string
        startTime:
          type: string
        point:
          type: string
        floor:
          type: string

  responses:
    Success:
      description: 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'