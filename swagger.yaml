          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              parking_name:
                type: string
              file_address:
                type: string

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        errorCode:
          type: string

  responses:
    Success:
      description: 성공
