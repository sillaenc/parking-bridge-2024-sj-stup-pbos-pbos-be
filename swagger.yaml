  # ======== 나머지 API 경로들은 간소화하여 표시 ========
  # 실제 구현된 모든 엔드포인트를 포함하되, 상세 스키마는 중요한 API만 유지

  # ======== 신규 분리된 API들 ========
  
  # 주차 구역 관리 API
  /api/v1/parking-zones:
    get:
      tags: [parking-zones]
      summary: 모든 주차 구역 조회
      description: 등록된 모든 주차 구역의 목록을 조회합니다.
      responses:
        '200':
          description: 주차 구역 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Parking zones retrieved successfully"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        parking_name:
                          type: string
                          example: "B1.json"
                        file_address:
                          type: string
                          example: "json_folder/B1.json"
    post:
      tags: [parking-zones]
      summary: 파일 업로드 및 주차 구역 생성
      description: 파일을 업로드하고 새로운 주차 구역을 생성합니다.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 업로드할 파일 (최대 500MB)
                filename:
                  type: string
                  description: 파일명 (확장자 포함)
              required:
                - file
                - filename
      responses:
        '201':
          description: 파일 업로드 및 주차 구역 생성 성공
        '400':
          description: 잘못된 파일 형식 또는 요청
        '409':
          description: 동일한 이름의 구역이 이미 존재

  /api/v1/parking-zones/{name}:
    get:
      tags: [parking-zones]
      summary: 특정 주차 구역 조회
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: 주차 구역 이름
      responses:
        '200':
          description: 주차 구역 조회 성공
        '404':
          description: 주차 구역을 찾을 수 없음
    put:
      tags: [parking-zones]
      summary: 파일 업데이트 및 주차 구역 수정
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: 수정할 주차 구역 이름
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                oldFilename:
                  type: string
                newFilename:
                  type: string
      responses:
        '200':
          description: 주차 구역 수정 성공
        '400':
          description: 잘못된 요청 또는 파일명 불일치
        '404':
          description: 주차 구역을 찾을 수 없음
    delete:
      tags: [parking-zones]
      summary: 파일 삭제 및 주차 구역 삭제
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: 삭제할 주차 구역 이름
      responses:
        '200':
          description: 주차 구역 삭제 성공
        '404':
          description: 주차 구역을 찾을 수 없음

