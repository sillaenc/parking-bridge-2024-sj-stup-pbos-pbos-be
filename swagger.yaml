  # ======== 16. 모니터링 API (11개) ========
  /api/v1/monitoring/health:
    get:
      tags: [system]
      summary: 전체 시스템 생존 상태 확인
      description: 시스템 전체의 건강 상태를 확인합니다.
      parameters:
        - name: include_details
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 상세 정보 포함 여부
      responses:
        '200':
          description: 시스템 상태 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: "healthy"
                      services:
                        type: object
                      database:
                        type: object
                  timestamp:
                    type: string
        '503':
          description: 시스템 이용 불가
    post:
      tags: [system]
      summary: 새로운 서비스 URL 등록
      description: 모니터링할 새로운 서비스를 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  description: 서비스 식별 키
                  example: "parking_engine"
                value:
                  type: string
                  description: 서비스 URL
                  example: "http://localhost:3000"
      responses:
        '200':
          description: 서비스 등록 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                  timestamp:
                    type: string
        '400':
          description: 잘못된 요청
        '500':
          description: 서버 오류

  /api/v1/monitoring/health/services:
    get:
      tags: [system]
      summary: 등록된 서비스들의 생존 상태 확인
      description: 등록된 모든 서비스의 생존 상태를 확인합니다.
      parameters:
        - name: timeout
          in: query
