components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Login successful"
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT 액세스 토큰
            user:
              type: object
              properties:
                uid:
                  type: integer
                account:
                  type: string
                username:
                  type: string
                userlevel:
                  type: integer
                isActivated:
                  type: boolean

    CreateUserRequest:
      type: object
      required:
        - account
        - passwd
        - passwdCheck
        - username
        - userlevel
        - isActivated
      properties:
        account:
          type: string
          example: "newuser"
        passwd:
          type: string
          example: "password123"
        passwdCheck:
          type: string
          example: "password123"
        username:
          type: string
          example: "홍길동"
        userlevel:
          type: integer
          example: 1
        isActivated:
          type: integer
          example: 1

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          description: 사용자 이름
          example: "김철수"
        userlevel:
          type: integer
          description: 사용자 레벨 (1=일반, 2=관리자)
          example: 2
        isActivated:
          type: integer
          description: 활성화 상태 (0=비활성, 1=활성)
          example: 1

    ChangePasswordRequest:
      type: object
      properties:
        currentPassword:
          type: string
          description: 현재 비밀번호
          example: "oldpassword123"
        newPassword:
          type: string
          description: 새 비밀번호
          example: "newpassword123"
        newPasswordCheck:
          type: string
          description: 새 비밀번호 확인
          example: "newpassword123"
      required:
        - currentPassword
        - newPassword
        - newPasswordCheck

    UserListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            properties:
              account:
                type: string
              username:
                type: string
              userlevel:
                type: integer
              isActivated:
                type: integer

    ParkingZoneListResponse:
      type: object
      properties:
