      responses:
        '200':
          description: 서비스 상태 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      services:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                            url:
                              type: string
                            status:
                              type: string
                            response_time:
                              type: number
                  timestamp:
                    type: string
        '500':
          description: 서버 오류

  /api/v1/monitoring/health/isalive:
