  /api/v1/parking/information/info:
    get:
      tags: [base-info]
      summary: 기본 정보 서비스 정보 조회
      responses:
        '200':
          description: 서비스 정보

  /api/v1/parking/information/legacy:
    post:
      tags: [base-info]
      summary: 레거시 기본 정보 생성/업데이트
      deprecated: true
      responses:
        '200':
          description: 처리 완료

  /api/v1/parking/information/legacy/get:
    get:
      tags: [base-info]
      summary: 레거시 기본 정보 조회 (통계 포함)
      deprecated: true
      responses:
        '200':
          description: 정보 조회 성공

  # ======== 차량 정보 API (Vehicle) ========
  /api/v1/vehicle/info:
    get:
      tags: [vehicle]
      summary: 차량 정보 조회
      description: 현재 주차된 차량들의 정보를 조회합니다.
      responses:
        '200':
          description: 차량 정보 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleInfo'

  /api/v1/vehicle/location/{vehicleId}:
    get:
      tags: [vehicle]
      summary: 특정 차량 위치 조회
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
          description: 차량 ID
      responses:
        '200':
          description: 차량 위치 정보
        '404':
          description: 차량을 찾을 수 없음

  /api/v1/vehicle/by-tag:
    get:
      tags: [vehicle]
      summary: 태그로 차량 정보 조회 (GET)
      parameters:
        - name: tag
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 차량 정보
