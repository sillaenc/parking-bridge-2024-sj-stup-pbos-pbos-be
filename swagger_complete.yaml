openapi: 3.0.3
info:
  title: 스마트 파킹 백엔드 API - 완전판
  description: |
    ## 🎯 **100+ 전체 API 엔드포인트 완전 문서**
    
    이 문서는 실제 구현된 모든 API를 포함하며, 레거시 호환성 API까지 모두 문서화되어 있습니다.
    2025년 9월 24일 기준으로 테스트 완료된 엔드포인트들입니다.
    
    ### 📊 카테고리별 API 분포 (실제 구현됨)
    - **인증 (Auth)**: 17개 - 로그인, 토큰 관리, 레거시 호환 (최상위 경로 포함)
    - **사용자 관리 (Users)**: 11개 - 계정 생성, 수정, 삭제, 관리자 생성 (최상위 경로 포함)
    - **파일 관리 (Files)**: 25개 - 파일 업로드/수정/삭제(500MB 지원), 동기화, 주차 구역 관리
    - **통계 (Statistics)**: 26개 - 일일/주간/월간/연간 통계 분석, 그래프 데이터, 레거시 통계 API
    - **전광판 (Electric Signs)**: 10개 - 전광판 제어 및 관리 (최상위 경로 포함)
    - **기본 정보 (Base Info)**: 8개 - 주차장 기본 설정 (최상위 경로 포함)
    - **설정 (Settings)**: 11개 - 데이터베이스 관리, 시스템 설정 (최상위 경로 포함)
    - **시스템 상태 (System)**: 11개 - 모니터링 및 상태 확인 (완전 리팩토링됨)
    - **차량 정보 (Vehicle)**: 5개 - 차량 위치 및 상태
    - **디스플레이 (Display)**: 6개 - 디스플레이 제어 (신규 + 레거시)
    - **광고판 (Billboard)**: 6개 - 광고판 관리 (신규 + 레거시)
    - **중앙 대시보드 (Central)**: 3개 - 통합 현황 (신규 + 레거시)
    - **LED 계산 (LED)**: 4개 - LED 색상 계산 (신규 + 레거시)
    - **엔진 데이터**: 6개 - 실시간 데이터 처리
    - **리소스 관리 (Resources)**: 7개 - 주차장 리소스 관리 (완전 리팩토링됨)
    - **기타 (Utilities)**: 3개 - 그래프 데이터 등
    
    ## 🔧 기술 스택
    - **백엔드**: Dart (shelf 프레임워크)
    - **데이터베이스**: SQLite (ws4sqlite 통신)
    - **인증**: JWT Bearer Token
    - **파일 관리**: Local File System (최대 500MB 지원)
    - **아키텍처**: 3계층 구조 (모델-서비스-API)
    
    ## 📁 파일 관리 기능
    - **지원 형식**: 이미지, 비디오, 문서, 데이터, 압축 파일 (25+ 확장자)
    - **최대 크기**: 500MB per file
    - **동기화**: 파일시스템-DB 양방향 동기화
    - **메타데이터**: 파일 크기, 타입, 카테고리, MIME 타입 관리
    
    ## 🔄 레거시 호환성
    이 문서는 기존 클라이언트와의 호환성을 위해 레거시 API들도 포함합니다:
    - 최상위 경로 API들 (deprecated)
    - 기존 클라이언트 지원을 위한 레거시 엔드포인트들
    - 점진적 마이그레이션을 위한 병행 운영 API들
    
  version: 2.2.1
  contact:
    name: 스마트 파킹 시스템 지원팀
  license:
    name: MIT

security:
  - BearerAuth: []

tags:
  - name: auth
    description: 인증 및 토큰 관리 (17개 엔드포인트) - 신규/레거시/최상위 경로 호환
  - name: users
    description: 사용자 계정 관리 (11개 엔드포인트) - 관리자 생성, 최상위 경로 포함
  - name: files
    description: 파일 관리 및 동기화 (25개 엔드포인트) - 500MB 파일 지원, 25+ 확장자, 파일시스템 동기화, 주차 구역 관리
  - name: statistics
    description: 통계 데이터 분석 (26개 엔드포인트) - 그래프 데이터, 레거시 통계 API 포함
  - name: electric-signs
    description: 전광판 제어 및 관리 (10개 엔드포인트) - 최상위 경로 포함
  - name: base-info
    description: 주차장 기본 정보 관리 (8개 엔드포인트) - 최상위 경로 포함
  - name: vehicle
    description: 차량 정보 및 위치 조회 (5개 엔드포인트)
  - name: display
    description: 디스플레이 제어 (6개 엔드포인트) - 신규/레거시 API
  - name: billboard
    description: 광고판 관리 (6개 엔드포인트) - 신규/레거시 API
  - name: central
    description: 중앙 대시보드 (3개 엔드포인트) - 신규/레거시 API
  - name: led
    description: LED 계산 (4개 엔드포인트) - 신규/레거시 API
  - name: system
    description: 시스템 모니터링 (11개 엔드포인트) - 완전 리팩토링된 모니터링 API
  - name: settings
    description: 시스템 설정 (11개 엔드포인트) - 데이터베이스 관리, 일괄 업데이트 포함
  - name: engine
    description: 엔진 데이터 처리 (6개 엔드포인트)
  - name: utilities
    description: 리소스 관리 및 유틸리티 (10개 엔드포인트) - 주차장 리소스, 그래프 데이터

paths:
  # ======== 1. 인증 API (7개 신규 + 10개 레거시) ========
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 사용자 로그인
      description: 계정 정보로 로그인하여 JWT 토큰을 발급받습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, passwd]
              properties:
                account:
                  type: string
                  description: 사용자 계정
                  example: "admin"
                passwd:
                  type: string
                  description: 비밀번호
                  example: "password123"
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Login successful"
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: JWT 액세스 토큰
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      user:
                        type: object
                        properties:
                          uid:
                            type: integer
                          account:
                            type: string
                          username:
                            type: string
                          userlevel:
                            type: integer
                          isActivated:
                            type: boolean
        '401':
          description: 로그인 실패 (잘못된 계정 정보)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Invalid credentials"
                  errorCode:
                    type: string
                    example: "INVALID_CREDENTIALS"

  /api/v1/auth/base-info:
    get:
      tags: [auth]
      summary: 기본 정보 조회
      description: 로그인 후 주차장 기본 정보를 조회합니다.
      responses:
        '200':
          description: 기본 정보 조회 성공

  /api/v1/auth/token:
    get:
      tags: [auth]
      summary: 토큰 정보 조회
      responses:
        '200':
          description: 토큰 정보

  /api/v1/auth/protected:
    get:
      tags: [auth]
      summary: 보호된 엔드포인트 테스트
      responses:
        '200':
          description: 인증 성공

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: 토큰 갱신
      responses:
        '200':
          description: 토큰 갱신 성공

  /api/v1/auth/health:
    get:
      tags: [auth]
      summary: 인증 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/auth/info:
    get:
      tags: [auth]
      summary: 인증 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # 레거시 인증 API
  /api/v1/auth/accounts/check:
    get:
      tags: [auth]
      summary: 계정 목록 확인
      responses:
        '200':
          description: 계정 확인 성공

  /api/v1/auth/legacy:
    post:
      tags: [auth]
      summary: 레거시 로그인 (기존 클라이언트 호환)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: string
                  description: 계정
                passwd:
                  type: string
                  description: 비밀번호
      responses:
        '200':
          description: 로그인 성공

  /api/v1/auth/legacy/base:
    get:
      tags: [auth]
      summary: 레거시 기본 정보 조회
      responses:
        '200':
          description: 기본 정보 조회 성공

  /api/v1/auth/legacy/jwt:
    get:
      tags: [auth]
      summary: 레거시 JWT 토큰 조회
      responses:
        '200':
          description: JWT 토큰 조회 성공

  /api/v1/auth/legacy/protected:
    get:
      tags: [auth]
      summary: 레거시 보호된 리소스 접근 테스트
      responses:
        '200':
          description: 접근 성공

  /api/v1/auth/status:
    get:
      tags: [auth]
      summary: 로그인 상태 및 기본 정보 조회
      responses:
        '200':
          description: 상태 정보 조회 성공

  /api/v1/auth/status/profile:
    post:
      tags: [auth]
      summary: 사용자 프로필 조회
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: string
                  description: 계정
      responses:
        '200':
          description: 프로필 조회 성공

  # 최상위 레거시 인증 API
  /confirm_account_list:
    get:
      tags: [auth]
      summary: 레거시 계정 목록 확인 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 계정 목록

  /parking_status:
    get:
      tags: [auth]
      summary: 레거시 주차 상태 조회 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 주차 상태 정보

  /login_setting:
    post:
      tags: [auth]
      summary: 레거시 로그인 설정 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 로그인 성공

  # ======== 2. 사용자 관리 API (9개 신규 + 2개 레거시) ========
  /api/v1/users:
    get:
      tags: [users]
      summary: 모든 사용자 조회
      responses:
        '200':
          description: 사용자 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        account:
                          type: string
                        username:
                          type: string
                        userlevel:
                          type: integer
                        isActivated:
                          type: integer
    post:
      tags: [users]
      summary: 새 사용자 생성
      description: 새로운 사용자 계정을 생성합니다
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - passwd
                - passwdCheck
                - username
                - userlevel
                - isActivated
              properties:
                account:
                  type: string
                  example: "newuser"
                passwd:
                  type: string
                  example: "password123"
                passwdCheck:
                  type: string
                  example: "password123"
                username:
                  type: string
                  example: "홍길동"
                userlevel:
                  type: integer
                  example: 1
                isActivated:
                  type: integer
                  example: 1
      responses:
        '201':
          description: 사용자 생성 성공
        '400':
          description: 잘못된 요청 (필수 필드 누락, 비밀번호 불일치 등)
        '409':
          description: 계정이 이미 존재함

  /api/v1/users/{account}:
    get:
      tags: [users]
      summary: 특정 사용자 조회
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 사용자 정보
    put:
      tags: [users]
      summary: 사용자 정보 수정
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: 사용자 이름
                  example: "김철수"
                userlevel:
                  type: integer
                  description: 사용자 레벨 (1=일반, 2=관리자)
                  example: 2
                isActivated:
                  type: integer
                  description: 활성화 상태 (0=비활성, 1=활성)
                  example: 1
      responses:
        '200':
          description: 사용자 정보 수정 성공
        '404':
          description: 사용자를 찾을 수 없음
    delete:
      tags: [users]
      summary: 사용자 삭제
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 성공

  /api/v1/users/{account}/password:
    patch:
      tags: [users]
      summary: 비밀번호 변경
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                  description: 현재 비밀번호
                  example: "oldpassword123"
                newPassword:
                  type: string
                  description: 새 비밀번호
                  example: "newpassword123"
                newPasswordCheck:
                  type: string
                  description: 새 비밀번호 확인
                  example: "newpassword123"
              required:
                - currentPassword
                - newPassword
                - newPasswordCheck
      responses:
        '200':
          description: 비밀번호 변경 성공
        '400':
          description: 잘못된 요청 (비밀번호 불일치, 형식 오류 등)
        '401':
          description: 현재 비밀번호가 틀림
        '404':
          description: 사용자를 찾을 수 없음

  /api/v1/users/{account}/password/reset:
    patch:
      tags: [users]
      summary: 비밀번호 초기화
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 비밀번호 초기화 성공

  /api/v1/users/health:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  /api/v1/users/info:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # 레거시 사용자 관리 API
  /api/v1/users/admin:
    post:
      tags: [users]
      summary: 관리자 계정 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: string
                  description: 계정 ID
                username:
                  type: string
                  description: 사용자 이름
                passwd:
                  type: string
                  description: 비밀번호
      responses:
        '200':
          description: 관리자 생성 성공

  # 최상위 레거시 사용자 API
  /create_admin:
    post:
      tags: [users]
      summary: 레거시 관리자 생성 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 관리자 생성 성공

  /settings_account:
    get:
      tags: [settings]
      summary: 레거시 계정 설정 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 계정 설정 정보

  # ======== 3. 파일 관리 API (13개 신규 + 12개 확장) ========
  /api/v1/files:
    get:
      tags: [files]
      summary: 모든 주차 구역 조회
      responses:
        '200':
          description: 주차 구역 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        parking_name:
                          type: string
                        file_address:
                          type: string
    post:
      tags: [files]
      summary: 파일 업로드 및 주차 구역 생성 (최대 500MB 지원)
      description: |
        지원되는 파일 형식:
        - **이미지**: jpg, jpeg, png, gif, bmp, webp, tiff, ico
        - **비디오**: mp4, avi, mov, wmv, flv, webm, mkv, mpg, mpeg, m4v, 3gp
        - **문서**: pdf, doc, docx, xls, xlsx, ppt, pptx, txt, csv
        - **데이터**: json, xml, yaml, yml
        - **압축**: zip, rar, 7z, tar, gz
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 업로드할 파일 (최대 500MB)
                filename:
                  type: string
                  description: 파일명 (확장자 포함)
              required:
                - file
                - filename
      responses:
        '201':
          description: 파일 업로드 및 주차 구역 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      filename:
                        type: string
                      fileSize:
                        type: integer
                      fileType:
                        type: string
                      uploadedAt:
                        type: string
                        format: date-time
        '400':
          description: 잘못된 요청 (파일 형식 미지원 등)
        '413':
          description: 파일 크기 초과 (500MB 제한)

  /api/v1/files/{name}:
    get:
      tags: [files]
      summary: 특정 주차 구역 조회
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 주차 구역 정보
    put:
      tags: [files]
      summary: 파일 업데이트 및 주차 구역 업데이트
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 새로운 파일 (최대 500MB)
              required:
                - file
      responses:
        '200':
          description: 파일 업데이트 및 주차 구역 수정 완료
        '404':
          description: 주차 구역을 찾을 수 없음
    delete:
      tags: [files]
      summary: 주차 구역 삭제
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 완료

  /api/v1/files/lots/{tag}/type:
    patch:
      tags: [files]
      summary: 주차 공간 유형 변경
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 유형 변경 완료

  /api/v1/files/lots/{tag}/status:
    patch:
      tags: [files]
      summary: 주차 상태 변경
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 상태 변경 완료

  /api/v1/files/list:
    get:
      tags: [files]
      summary: 파일 시스템 파일 목록 조회
      description: 실제 파일 시스템에 존재하는 모든 파일들을 조회합니다
      responses:
        '200':
          description: 파일 시스템 파일 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        fullPath:
                          type: string
                        sizeBytes:
                          type: integer
                        extension:
                          type: string
                        lastModified:
                          type: string
                          format: date-time

  /api/v1/files/sync:
    post:
      tags: [files]
      summary: 수동 파일시스템 동기화
      description: |
        파일시스템과 데이터베이스 간의 수동 동기화를 실행합니다:
        - 파일시스템에 없는 DB 레코드 정리 (고아 레코드 삭제)
        - DB에 없는 파일시스템 파일들을 DB에 추가
      responses:
        '200':
          description: 동기화 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      totalFiles:
                        type: integer
                        description: 총 파일 수
                      totalSize:
                        type: integer
                        description: 총 파일 크기 (bytes)
                      totalSizeMB:
                        type: string
                        description: 총 파일 크기 (MB)
                      supportedFiles:
                        type: integer
                        description: 지원되는 파일 수
                      unsupportedFiles:
                        type: integer
                        description: 지원되지 않는 파일 수
                      syncDurationMs:
                        type: integer
                        description: 동기화 소요 시간 (밀리초)
                      syncedAt:
                        type: string
                        format: date-time
                        description: 동기화 완료 시간
                      totalParkingZones:
                        type: integer
                        description: 총 주차구역 수
                      status:
                        type: string
                        enum: [completed, failed, partial]
                        description: 동기화 상태

  /api/v1/files/health:
    get:
      tags: [files]
      summary: 파일시스템 상태 확인
      description: 파일시스템과 데이터베이스 간의 일관성 상태를 확인합니다
      responses:
        '200':
          description: 파일시스템 상태 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [healthy, warning, error]
                      filesystemFiles:
                        type: integer
                        description: 파일시스템 파일 수
                      databaseRecords:
                        type: integer
                        description: 데이터베이스 레코드 수
                      syncRequired:
                        type: boolean
                        description: 동기화 필요 여부
                      orphanedFiles:
                        type: integer
                        description: 고아 파일 수
                      missingFiles:
                        type: integer
                        description: 누락된 파일 수
                      lastSyncAt:
                        type: string
                        format: date-time
                        description: 마지막 동기화 시간

  /api/v1/files/service-health:
    get:
      tags: [files]
      summary: 주차 구역 관리 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  /api/v1/files/info:
    get:
      tags: [files]
      summary: 주차 구역 관리 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # 카메라 주차 API (파일 관리 카테고리 포함)
  /api/v1/settings/camera-parking/surfaces:
