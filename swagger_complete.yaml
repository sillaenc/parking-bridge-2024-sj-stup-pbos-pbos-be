      summary: 수동 파일시스템 동기화
      description: |
        파일시스템과 데이터베이스 간의 수동 동기화를 실행합니다:
        - 파일시스템에 없는 DB 레코드 정리 (고아 레코드 삭제)
        - DB에 없는 파일시스템 파일들을 DB에 추가
      responses:
        '200':
          description: 동기화 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      totalFiles:
                        type: integer
                        description: 총 파일 수
                      totalSize:
                        type: integer
                        description: 총 파일 크기 (bytes)
                      totalSizeMB:
                        type: string
                        description: 총 파일 크기 (MB)
                      supportedFiles:
                        type: integer
                        description: 지원되는 파일 수
                      unsupportedFiles:
                        type: integer
                        description: 지원되지 않는 파일 수
