      responses:
        '200':
          description: 일별 통계 데이터
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object

  /api/v1/statistics/weekly:
    get:
      tags: [statistics]
      summary: 주별 통계 조회
      description: 특정 주의 주차 통계를 조회합니다.
      parameters:
        - name: week
          in: query
          schema:
            type: string
          description: 조회할 주 (YYYY-WW)
      responses:
        '200':
          description: 주별 통계 데이터

  /api/v1/statistics/monthly:
    get:
      tags: [statistics]
      summary: 월별 통계 조회
      description: 특정 월의 주차 통계를 조회합니다.
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: 조회할 월 (YYYY-MM)
      responses:
        '200':
          description: 월별 통계 데이터

  /api/v1/statistics/yearly:
    get:
      tags: [statistics]
      summary: 연별 통계 조회
      description: 특정 연도의 주차 통계를 조회합니다.
      parameters:
        - name: year
          in: query
          schema:
            type: integer
          description: 조회할 연도
      responses:
        '200':
          description: 연별 통계 데이터

  /api/v1/statistics/graph:
    post:
      tags: [statistics]
      summary: 그래프용 통계 데이터 조회
      description: 차트 및 그래프 표시를 위한 통계 데이터를 조회합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                type:
                  type: string
                  enum: [daily, weekly, monthly]
      responses:
        '200':
          description: 그래프용 통계 데이터

  # ======== 전광판 API (Electric Signs) ========
  /api/v1/parking/electric-signs:
    get:
      tags: [electric-signs]
      summary: 모든 전광판 조회
      description: 시스템에 등록된 모든 전광판 목록을 조회합니다.
      responses:
        '200':
          description: 전광판 목록
