openapi: 3.0.3
info:
  title: 스마트 파킹 백엔드 API - 완전판
  description: |
    ## 🎯 **137개 전체 API 엔드포인트 완전 문서**
    
    ### 📊 카테고리별 API 분포
    - **인증 (Auth)**: 17개 - 로그인, 토큰 관리, 레거시 호환 (최상위 경로 포함)
    - **사용자 관리 (Users)**: 11개 - 계정 생성, 수정, 삭제, 관리자 생성 (최상위 경로 포함)
    - **주차 구역 (Parking Zones)**: 21개 - 구역 및 카메라 관리, 차량 정보 (최상위 경로 포함)
    - **통계 (Statistics)**: 26개 - 일일/주간/월간/연간 통계 분석, 그래프 데이터, 레거시 통계 API
    - **전광판 (Electric Signs)**: 10개 - 전광판 제어 및 관리 (최상위 경로 포함)
    - **기본 정보 (Base Info)**: 8개 - 주차장 기본 설정 (최상위 경로 포함)
    - **설정 (Settings)**: 4개 - 시스템 설정 관리 (최상위 경로 포함)
    - **시스템 상태 (System)**: 9개 - 모니터링 및 상태 확인
    - **차량 정보 (Vehicle)**: 5개 - 차량 위치 및 상태
    - **디스플레이 (Display)**: 6개 - 디스플레이 제어 (신규 + 레거시)
    - **광고판 (Billboard)**: 6개 - 광고판 관리 (신규 + 레거시)
    - **중앙 대시보드 (Central)**: 3개 - 통합 현황 (신규 + 레거시)
    - **LED 계산 (LED)**: 4개 - LED 색상 계산 (신규 + 레거시)
    - **엔진 데이터**: 6개 - 실시간 데이터 처리
    - **기타 (Utilities)**: 1개 - 리소스 관리
    
    ## 🔧 기술 스택
    - **백엔드**: Dart (shelf 프레임워크)
    - **데이터베이스**: SQLite (ws4sqlite 통신)
    - **인증**: JWT Bearer Token
    - **아키텍처**: 3계층 구조 (모델-서비스-API)
    
  version: 2.1.0
  contact:
    name: 스마트 파킹 시스템 지원팀
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: 개발 서버

security:
  - BearerAuth: []

tags:
  - name: auth
    description: 인증 및 토큰 관리 (17개 엔드포인트) - 신규/레거시/최상위 경로 호환
  - name: users
    description: 사용자 계정 관리 (11개 엔드포인트) - 관리자 생성, 최상위 경로 포함
  - name: parking-zones
    description: 주차 구역 및 카메라 관리 (21개 엔드포인트) - 차량 정보, 최상위 경로 포함
  - name: statistics
    description: 통계 데이터 분석 (26개 엔드포인트) - 그래프 데이터, 레거시 통계 API 포함
  - name: electric-signs
    description: 전광판 제어 및 관리 (10개 엔드포인트) - 최상위 경로 포함
  - name: base-info
    description: 주차장 기본 정보 관리 (8개 엔드포인트) - 최상위 경로 포함
  - name: vehicle
    description: 차량 정보 및 위치 조회 (5개 엔드포인트)
  - name: display
    description: 디스플레이 제어 (6개 엔드포인트) - 신규/레거시 API
  - name: billboard
    description: 광고판 관리 (6개 엔드포인트) - 신규/레거시 API
  - name: central
    description: 중앙 대시보드 (3개 엔드포인트) - 신규/레거시 API
  - name: led
    description: LED 계산 (4개 엔드포인트) - 신규/레거시 API
  - name: system
    description: 시스템 모니터링 (9개 엔드포인트) - 상태 확인
  - name: settings
    description: 시스템 설정 (4개 엔드포인트) - 일괄 업데이트, 최상위 경로 포함
  - name: engine
    description: 엔진 데이터 처리 (6개 엔드포인트)
  - name: utilities
    description: 기타 유틸리티 (1개 엔드포인트) - 리소스 관리

paths:
  # ======== 1. 인증 API (11개) ========
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 사용자 로그인
      description: 계정 정보로 로그인하여 JWT 토큰을 발급받습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, password]
              properties:
                account:
                  type: string
                  description: 사용자 계정
                password:
                  type: string
                  description: 비밀번호
      responses:
        '200':
          description: 로그인 성공

  /api/v1/auth/base-info:
    get:
      tags: [auth]
      summary: 기본 정보 조회
      description: 로그인 후 주차장 기본 정보를 조회합니다.
      responses:
        '200':
          description: 기본 정보 조회 성공

  /api/v1/auth/token:
    get:
      tags: [auth]
      summary: 토큰 정보 조회
      responses:
        '200':
          description: 토큰 정보

  /api/v1/auth/protected:
    get:
      tags: [auth]
      summary: 보호된 엔드포인트 테스트
      responses:
        '200':
          description: 인증 성공

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: 토큰 갱신
      responses:
        '200':
          description: 토큰 갱신 성공

  /api/v1/auth/health:
    get:
      tags: [auth]
      summary: 인증 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/auth/info:
    get:
      tags: [auth]
      summary: 인증 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # ======== 2. 사용자 관리 API (21개) ========
  /api/v1/users:
    get:
      tags: [users]
      summary: 모든 사용자 조회
      responses:
        '200':
          description: 사용자 목록 조회 성공
    post:
      tags: [users]
      summary: 새 사용자 생성
      responses:
        '201':
          description: 사용자 생성 성공

  /api/v1/users/{account}:
    get:
      tags: [users]
      summary: 특정 사용자 조회
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 사용자 정보
    put:
      tags: [users]
      summary: 사용자 정보 수정
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 수정 성공
    delete:
      tags: [users]
      summary: 사용자 삭제
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 성공

  /api/v1/users/{account}/password:
    patch:
      tags: [users]
      summary: 비밀번호 변경
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 비밀번호 변경 성공

  /api/v1/users/{account}/password/reset:
    patch:
      tags: [users]
      summary: 비밀번호 초기화
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 비밀번호 초기화 성공

  /api/v1/users/health:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  /api/v1/users/info:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # ======== 3. 주차 구역 관리 API (22개) ========
  /api/v1/settings/parking-zones:
    get:
      tags: [parking-zones]
      summary: 모든 주차 구역 조회
      responses:
        '200':
          description: 주차 구역 목록
    post:
      tags: [parking-zones]
      summary: 새 주차 구역 생성
      responses:
        '201':
          description: 주차 구역 생성 성공

  /api/v1/settings/parking-zones/{name}:
    get:
      tags: [parking-zones]
      summary: 특정 주차 구역 조회
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 주차 구역 정보
    put:
      tags: [parking-zones]
      summary: 주차 구역 수정
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 수정 완료
    delete:
      tags: [parking-zones]
      summary: 주차 구역 삭제
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 완료

  /api/v1/settings/parking-zones/lots/{tag}/type:
    patch:
      tags: [parking-zones]
      summary: 주차 공간 유형 변경
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 유형 변경 완료

  /api/v1/settings/parking-zones/lots/{tag}/status:
    patch:
      tags: [parking-zones]
      summary: 주차 상태 변경
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 상태 변경 완료

  /api/v1/settings/parking-zones/files:
    get:
      tags: [parking-zones]
      summary: 파일 시스템 파일 목록 조회
      responses:
        '200':
          description: 파일 목록

  /api/v1/settings/parking-zones/health:
    get:
      tags: [parking-zones]
      summary: 주차 구역 관리 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  /api/v1/settings/parking-zones/info:
    get:
      tags: [parking-zones]
      summary: 주차 구역 관리 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  /api/v1/settings/camera-parking/surfaces:
    get:
      tags: [parking-zones]
      summary: 모든 카메라 주차 표면 조회
      responses:
        '200':
          description: 카메라 표면 목록
    post:
      tags: [parking-zones]
      summary: 새 카메라 표면 생성
      responses:
        '201':
          description: 생성 완료

  /api/v1/settings/camera-parking/surfaces/{surfaceId}:
    get:
      tags: [parking-zones]
      summary: 특정 카메라 표면 조회
      parameters:
        - name: surfaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 카메라 표면 정보
    put:
      tags: [parking-zones]
      summary: 카메라 표면 업데이트
      parameters:
        - name: surfaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 업데이트 완료
    delete:
      tags: [parking-zones]
      summary: 카메라 표면 삭제
      parameters:
        - name: surfaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 완료

  /api/v1/settings/camera-parking/health:
    get:
      tags: [parking-zones]
      summary: 카메라 주차 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/settings/camera-parking/info:
    get:
      tags: [parking-zones]
      summary: 카메라 주차 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # ======== 4. 전광판 API (17개) ========
  /api/v1/parking/electric-signs:
    get:
      tags: [electric-signs]
      summary: 모든 전광판 조회
      responses:
        '200':
          description: 전광판 목록
    post:
      tags: [electric-signs]
      summary: 새 전광판 추가
      responses:
        '201':
          description: 전광판 추가 성공

  /api/v1/parking/electric-signs/{uid}:
    get:
      tags: [electric-signs]
      summary: 특정 전광판 조회
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 전광판 정보
    put:
      tags: [electric-signs]
      summary: 전광판 수정
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 수정 완료
    delete:
      tags: [electric-signs]
      summary: 전광판 삭제
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료

  /api/v1/parking/electric-signs/statistics:
    get:
      tags: [electric-signs]
      summary: 전광판 통계
      responses:
        '200':
          description: 전광판 통계

  /api/v1/parking/electric-signs/parking-lot/{parkingLot}:
    get:
      tags: [electric-signs]
      summary: 주차장별 전광판 조회
      parameters:
        - name: parkingLot
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 주차장별 전광판 목록

  /api/v1/parking/electric-signs/health:
    get:
      tags: [electric-signs]
      summary: 전광판 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  /api/v1/parking/electric-signs/info:
    get:
      tags: [electric-signs]
      summary: 전광판 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # ======== 5. 주차장 기본 정보 API (11개) ========
  /api/v1/parking/information:
    get:
      tags: [base-info]
      summary: 주차장 기본 정보 조회
      responses:
        '200':
          description: 기본 정보 조회 성공
    post:
      tags: [base-info]
      summary: 주차장 기본 정보 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseInformation'
      responses:
        '201':
          description: 등록 성공
    put:
      tags: [base-info]
      summary: 주차장 기본 정보 수정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseInformation'
      responses:
        '200':
          description: 수정 성공

  /api/v1/parking/information/statistics:
    get:
      tags: [base-info]
      summary: 주차장 통계 정보 조회
      responses:
        '200':
          description: 통계 정보

  /api/v1/parking/information/full:
    get:
      tags: [base-info]
      summary: 기본 정보 + 통계 조회
      responses:
        '200':
          description: 전체 정보

  /api/v1/parking/information/health:
    get:
      tags: [base-info]
      summary: 기본 정보 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/parking/information/info:
    get:
      tags: [base-info]
      summary: 기본 정보 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # ======== 6. 엔진 데이터 API (6개) ========
  /api/v1/engine/data/process:
    get:
      tags: [engine]
      summary: 엔진 데이터 수동 처리 트리거
      responses:
        '200':
          description: 처리 완료

  /api/v1/engine/data/status:
    get:
      tags: [engine]
      summary: 현재 주차장 상태 조회
      responses:
        '200':
          description: 주차장 상태

  /api/v1/engine/data/errors:
    get:
      tags: [engine]
      summary: 현재 에러 상태 조회
      responses:
        '200':
          description: 에러 상태

  /api/v1/engine/data/statistics:
    get:
      tags: [engine]
      summary: 처리 통계 정보 조회
      responses:
        '200':
          description: 통계 정보

  /api/v1/engine/data/statistics/trigger:
    post:
      tags: [engine]
      summary: 수동 통계 처리 트리거
      responses:
        '200':
          description: 처리 완료

  /api/v1/engine/data/health:
    get:
      tags: [engine]
      summary: 엔진 데이터 처리 서비스 헬스 체크
      responses:
        '200':
          description: 서비스 정상

  # ======== 7. 통계 API (26개) ========
  /api/v1/statistics/daily:
    get:
      tags: [statistics]
      summary: 일일 통계
      responses:
        '200':
          description: 일일 통계 데이터

  /api/v1/statistics/daily/all:
    get:
      tags: [statistics]
      summary: 전체 일일 통계
      responses:
        '200':
          description: 전체 일일 통계

  /api/v1/statistics/weekly:
    get:
      tags: [statistics]
      summary: 주간 통계
      responses:
        '200':
          description: 주간 통계

  /api/v1/statistics/monthly:
    get:
      tags: [statistics]
