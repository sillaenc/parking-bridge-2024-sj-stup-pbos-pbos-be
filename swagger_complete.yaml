      tags: [electric-signs]
      summary: 전광판 삭제
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 성공
        '404':
          description: 전광판을 찾을 수 없음

  /api/v1/parking/electric-signs/statistics:
    get:
      tags: [electric-signs]
      summary: 전광판 통계 조회
      description: 전광판 사용 통계 및 상태 정보를 조회합니다.
      responses:
        '200':
          description: 전광판 통계 데이터

  # ======== 주차장 기본 정보 API (Base Information) ========
  /api/v1/parking/information:
    get:
      tags: [base-info]
      summary: 주차장 기본 정보 조회
      description: 주차장의 기본 설정 정보를 조회합니다.
      responses:
        '200':
          description: 주차장 기본 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseInformation'
    put:
      tags: [base-info]
      summary: 주차장 기본 정보 업데이트
      description: 주차장의 기본 설정 정보를 업데이트합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BaseInformation'
      responses:
        '200':
          description: 업데이트 성공
        '400':
          description: 잘못된 요청

  # ======== 차량 정보 API (Vehicle) ========
  /api/v1/vehicle/info:
    get:
      tags: [vehicle]
      summary: 차량 정보 조회
      description: 현재 주차된 차량들의 정보를 조회합니다.
      responses:
        '200':
          description: 차량 정보 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleInfo'

  /api/v1/vehicle/location/{vehicleId}:
    get:
      tags: [vehicle]
      summary: 특정 차량 위치 조회
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: string
          description: 차량 ID
      responses:
        '200':
          description: 차량 위치 정보
        '404':
          description: 차량을 찾을 수 없음

  # ======== 디스플레이 API (Display) ========
  /api/v1/display:
    get:
      tags: [display]
      summary: 디스플레이 설정 조회
      description: 현재 디스플레이 설정을 조회합니다.
      responses:
        '200':
          description: 디스플레이 설정 정보
    put:
      tags: [display]
      summary: 디스플레이 설정 업데이트
      description: 디스플레이 설정을 업데이트합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brightness:
                  type: integer
                  minimum: 0
                  maximum: 100
                resolution:
                  type: string
                refreshRate:
                  type: integer
      responses:
        '200':
          description: 설정 업데이트 성공

  # ======== 광고판 API (Billboard) ========
  /api/v1/billboard:
    get:
      tags: [billboard]
      summary: 광고판 설정 조회
      description: 현재 광고판 설정을 조회합니다.
      responses:
        '200':
          description: 광고판 설정 정보
    put:
      tags: [billboard]
      summary: 광고판 설정 업데이트
      description: 광고판 설정을 업데이트합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                displayTime:
                  type: integer
                isActive:
                  type: boolean
      responses:
        '200':
          description: 설정 업데이트 성공

  # ======== 중앙 대시보드 API (Central Dashboard) ========
  /api/v1/central/dashboard:
    get:
      tags: [central]
      summary: 중앙 대시보드 데이터 조회
      description: 전체 시스템 현황을 위한 대시보드 데이터를 조회합니다.
      responses:
        '200':
          description: 대시보드 데이터
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalSpaces:
                    type: integer
                  occupiedSpaces:
                    type: integer
                  availableSpaces:
                    type: integer
                  occupancyRate:
                    type: number
                    format: float

  # ======== LED 계산 API (LED Calculation) ========
  /api/v1/led/calculate:
    post:
      tags: [led]
      summary: LED 색상 계산
      description: 주차 상태에 따른 LED 색상을 계산합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                occupancyRate:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 1
                zoneType:
                  type: string
                  enum: [normal, vip, disabled]
      responses:
        '200':
          description: LED 색상 정보
          content:
            application/json:
              schema:
                type: object
                properties:
                  color:
                    type: string
                  brightness:
                    type: integer
                  blinkPattern:
                    type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BaseInformation:
      type: object
      properties:
        parkingLotName:
          type: string
          description: 주차장 이름
        address:
          type: string
          description: 주차장 주소
        totalSpaces:
          type: integer
          description: 총 주차 공간 수
        availableSpaces:
          type: integer
          description: 사용 가능한 주차 공간 수
        contact:
          type: string
          description: 연락처

    ApiResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object

    ElectricSign:
      type: object
      properties:
        uid:
          type: string
          description: 전광판 고유 ID
        name:
          type: string
          description: 전광판 이름
        location:
          type: string
          description: 설치 위치
        status:
          type: string
          enum: [active, inactive, maintenance]
          description: 전광판 상태
        brightness:
          type: integer
          minimum: 0
          maximum: 100
          description: 밝기 설정

    ElectricSignCreate:
      type: object
      required: [name, location]
      properties:
        name:
          type: string
          description: 전광판 이름
        location:
          type: string
          description: 설치 위치
        brightness:
          type: integer
          minimum: 0
          maximum: 100
          default: 80

    ElectricSignUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]
        brightness:
          type: integer
          minimum: 0
          maximum: 100

    VehicleInfo:
      type: object
      properties:
        vehicleId:
          type: string
          description: 차량 ID
        licensePlate:
          type: string
          description: 차량 번호판
        location:
          type: string
          description: 주차 위치
        entryTime:
          type: string
          format: date-time
          description: 입차 시간
        status:
          type: string
          enum: [parked, exited]
          description: 차량 상태
        errorCode:
          type: string

    ParkingZone:
      type: object
      properties:
        uid:
          type: integer
        parking_name:
          type: string
        file_address:
          type: string
        floor:
          type: string

    Camera:
      type: object
      properties:
        uid:
          type: integer
        tag:
          type: string
        engine_code:
          type: string
        uri:
          type: string

  responses:
    Success:
      description: 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'