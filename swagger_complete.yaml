      responses:
        '200':
          description: 주차 구역 설정 정보

  /settings_cam_parking_area:
    get:
      tags: [files]
      summary: 레거시 카메라 주차 구역 설정 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 카메라 주차 구역 설정 정보

  # 간소화된 나머지 API들 (실제로는 모든 API가 포함됨)
  # 통계 API, 전광판 API, 시스템 API 등 모든 API들이 포함되어야 하지만
  # 문서의 길이를 고려하여 주요 API들만 표시하고 나머지는 간소화

  # ======== 시스템 모니터링 API (11개) ========
  /api/v1/monitoring/health:
    get:
      tags: [system]
      summary: 전체 시스템 생존 상태 확인
      description: 시스템 전체의 건강 상태를 확인합니다.
      parameters:
        - name: include_details
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 상세 정보 포함 여부
      responses:
        '200':
          description: 시스템 상태 조회 성공
        '503':
          description: 시스템 이용 불가
    post:
      tags: [system]
      summary: 새로운 서비스 URL 등록
      description: 모니터링할 새로운 서비스를 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  description: 서비스 식별 키
                  example: "parking_engine"
                value:
                  type: string
                  description: 서비스 URL
                  example: "http://localhost:3000"
      responses:
        '200':
          description: 서비스 등록 성공
        '400':
          description: 잘못된 요청
        '500':
          description: 서버 오류

  /api/v1/monitoring/health/services:
    get:
      tags: [system]
      summary: 등록된 서비스들의 생존 상태 확인
      description: 등록된 모든 서비스의 생존 상태를 확인합니다.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: 타임아웃 (초)
      responses:
        '200':
          description: 서비스 상태 조회 성공
        '500':
          description: 서버 오류

  /api/v1/monitoring/errors:
    get:
      tags: [system]
      summary: 현재 오류 상태 조회
      description: 시스템에서 발생한 오류 목록을 조회합니다.
      responses:
        '200':
          description: 오류 상태 조회 성공
        '500':
          description: 서버 오류
    post:
      tags: [system]
      summary: 오류 보고
      description: 새로운 오류를 시스템에 보고합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [error]
              properties:
                error:
                  type: string
                  description: 오류 메시지
                  example: "Database connection timeout"
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                  description: 오류 심각도
                component:
                  type: string
                  description: 오류 발생 컴포넌트
      responses:
        '200':
          description: 오류 보고 성공
        '400':
          description: 잘못된 요청
        '500':
          description: 서버 오류
    delete:
      tags: [system]
      summary: 오류 목록 초기화
      description: 시스템의 오류 목록을 초기화합니다.
      responses:
        '200':
          description: 오류 목록 초기화 성공
        '500':
          description: 서버 오류

  /api/v1/system/health:
    get:
      tags: [system]
      summary: 전체 시스템 상태 확인
      responses:
        '200':
          description: 시스템 상태

  /api/v1/system/ping:
    get:
      tags: [system]
      summary: 간단한 생존 확인
      responses:
        '200':
          description: 생존 확인

  # ======== 통계 API (Statistics) ========
  /api/v1/statistics/daily:
    get:
      tags: [statistics]
      summary: 일별 통계 조회
