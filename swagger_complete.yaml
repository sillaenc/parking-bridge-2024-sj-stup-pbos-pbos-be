          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: 태그를 찾을 수 없음
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

