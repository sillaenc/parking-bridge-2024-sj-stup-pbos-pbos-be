  # 통계 API, 전광판 API, 시스템 API 등 모든 API들이 포함되어야 하지만
  # 문서의 길이를 고려하여 주요 API들만 표시하고 나머지는 간소화

  # ======== 시스템 모니터링 API (11개) ========
  /api/v1/monitoring/health:
    get:
      tags: [system]
      summary: 전체 시스템 생존 상태 확인
      description: 시스템 전체의 건강 상태를 확인합니다.
      parameters:
        - name: include_details
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 상세 정보 포함 여부
      responses:
        '200':
          description: 시스템 상태 조회 성공
        '503':
          description: 시스템 이용 불가
    post:
      tags: [system]
      summary: 새로운 서비스 URL 등록
      description: 모니터링할 새로운 서비스를 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  description: 서비스 식별 키
                  example: "parking_engine"
                value:
                  type: string
                  description: 서비스 URL
                  example: "http://localhost:3000"
      responses:
        '200':
          description: 서비스 등록 성공
        '400':
          description: 잘못된 요청
        '500':
          description: 서버 오류

  /api/v1/monitoring/health/services:
    get:
      tags: [system]
      summary: 등록된 서비스들의 생존 상태 확인
      description: 등록된 모든 서비스의 생존 상태를 확인합니다.
      parameters:
        - name: timeout
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: 타임아웃 (초)
      responses:
        '200':
          description: 서비스 상태 조회 성공
        '500':
          description: 서버 오류

  /api/v1/monitoring/errors:
    get:
      tags: [system]
      summary: 현재 오류 상태 조회
      description: 시스템에서 발생한 오류 목록을 조회합니다.
      responses:
        '200':
          description: 오류 상태 조회 성공
        '500':
          description: 서버 오류
    post:
      tags: [system]
      summary: 오류 보고
      description: 새로운 오류를 시스템에 보고합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [error]
              properties:
                error:
                  type: string
                  description: 오류 메시지
                  example: "Database connection timeout"
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                  description: 오류 심각도
                component:
                  type: string
                  description: 오류 발생 컴포넌트
      responses:
        '200':
          description: 오류 보고 성공
        '400':
          description: 잘못된 요청
        '500':
          description: 서버 오류
    delete:
      tags: [system]
      summary: 오류 목록 초기화
      description: 시스템의 오류 목록을 초기화합니다.
      responses:
        '200':
          description: 오류 목록 초기화 성공
        '500':
          description: 서버 오류

  /api/v1/system/health:
    get:
      tags: [system]
      summary: 전체 시스템 상태 확인
      responses:
        '200':
          description: 시스템 상태

  /api/v1/system/ping:
    get:
      tags: [system]
      summary: 간단한 생존 확인
      responses:
        '200':
          description: 생존 확인

  # ======== 통계 API (Statistics) ========
  /api/v1/statistics/daily:
    get:
      tags: [statistics]
      summary: 일별 통계 조회
      description: 특정 날짜의 주차 통계를 조회합니다.
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: 조회할 날짜 (YYYY-MM-DD)
      responses:
        '200':
          description: 일별 통계 데이터
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object

  /api/v1/statistics/weekly:
    get:
      tags: [statistics]
      summary: 주별 통계 조회
      description: 특정 주의 주차 통계를 조회합니다.
      parameters:
        - name: week
          in: query
          schema:
            type: string
          description: 조회할 주 (YYYY-WW)
      responses:
        '200':
          description: 주별 통계 데이터

  /api/v1/statistics/monthly:
    get:
      tags: [statistics]
      summary: 월별 통계 조회
      description: 특정 월의 주차 통계를 조회합니다.
      parameters:
        - name: month
          in: query
          schema:
            type: string
          description: 조회할 월 (YYYY-MM)
      responses:
        '200':
          description: 월별 통계 데이터

  /api/v1/statistics/yearly:
    get:
      tags: [statistics]
      summary: 연별 통계 조회
      description: 특정 연도의 주차 통계를 조회합니다.
      parameters:
        - name: year
          in: query
          schema:
            type: integer
          description: 조회할 연도
      responses:
        '200':
          description: 연별 통계 데이터

  /api/v1/statistics/daily/all:
    get:
      tags: [statistics]
      summary: 모든 일별 통계 조회
      description: 모든 날짜의 일별 통계를 조회합니다.
      responses:
        '200':
          description: 전체 일별 통계 데이터

  /api/v1/statistics/monthly/all:
    get:
      tags: [statistics]
      summary: 모든 월별 통계 조회
      description: 모든 월의 월별 통계를 조회합니다.
      responses:
        '200':
          description: 전체 월별 통계 데이터

  /api/v1/statistics/yearly/all:
    get:
      tags: [statistics]
      summary: 모든 연별 통계 조회
      description: 모든 연도의 연별 통계를 조회합니다.
      responses:
        '200':
          description: 전체 연별 통계 데이터

  /api/v1/statistics/several-years:
    get:
      tags: [statistics]
      summary: 여러 해 통계 조회
      description: 여러 연도에 걸친 통계를 조회합니다.
      parameters:
        - name: years
          in: query
          schema:
            type: string
          description: 조회할 연도들 (쉼표로 구분)
      responses:
        '200':
          description: 여러 해 통계 데이터

  /api/v1/statistics/several-years/all:
    get:
      tags: [statistics]
      summary: 모든 여러 해 통계 조회
      description: 모든 연도에 걸친 통합 통계를 조회합니다.
      responses:
        '200':
          description: 전체 여러 해 통계 데이터

  /api/v1/statistics/custom-period:
    post:
      tags: [statistics]
      summary: 사용자 정의 기간 통계 조회
      description: |
        지정된 사용자 정의 기간의 통계를 조회합니다.
        호환: startDate/endDate 파라미터도 지원합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - startDay
                - endDay
              properties:
                startDay:
                  type: string
                  format: date
                  description: 조회 시작 날짜 (YYYY-MM-DD)
                  example: "2025-11-04"
                endDay:
                  type: string
                  format: date
                  description: 조회 종료 날짜 (YYYY-MM-DD)
                  example: "2025-11-05"
            examples:
              기본:
                value:
                  startDay: "2025-11-04"
                  endDay: "2025-11-05"
              호환 (startDate/endDate):
                value:
                  startDate: "2025-11-04"
                  endDate: "2025-11-05"
      responses:
        '200':
          description: 사용자 정의 기간 통계 데이터
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '400':
          description: 잘못된 요청 (파라미터 누락)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                  hint:
                    type: string

  /api/v1/statistics/graph:
    post:
      tags: [statistics]
      summary: 그래프용 통계 데이터 조회
      description: |
        차트 및 그래프 표시를 위한 통계 데이터를 조회합니다.
        시간 범위: 시작일 00시 ~ 종료일 23시
        호환: startDate/endDate 파라미터도 지원합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - startDay
                - endDay
              properties:
                startDay:
                  type: string
                  format: date
                  description: 조회 시작 날짜 (YYYY-MM-DD, 00시부터)
                  example: "2025-11-04"
                endDay:
                  type: string
                  format: date
                  description: 조회 종료 날짜 (YYYY-MM-DD, 23시까지)
                  example: "2025-11-05"
                type:
                  type: string
                  enum: [daily, weekly, monthly]
                  description: 그래프 타입 (선택사항)
            examples:
              기본:
                value:
                  startDay: "2025-11-04"
                  endDay: "2025-11-05"
              호환 (startDate/endDate):
                value:
                  startDate: "2025-11-04"
                  endDate: "2025-11-05"
      responses:
        '200':
          description: 그래프용 통계 데이터
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    recorded_hour:
                      type: string
                    car_type:
                      type: string
                    floor:
                      type: string
                    count:
                      type: integer
        '400':
          description: 잘못된 요청 (파라미터 누락)

  /api/v1/statistics/health:
    get:
      tags: [statistics]
      summary: 통계 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/statistics/info:
    get:
      tags: [statistics]
      summary: 통계 서비스 정보 조회
      responses:
        '200':
          description: 서비스 정보

  # ======== 전광판 API (Electric Signs) ========
  /api/v1/parking/electric-signs:
    get:
      tags: [electric-signs]
      summary: 모든 전광판 조회
      description: 시스템에 등록된 모든 전광판 목록을 조회합니다.
      responses:
        '200':
          description: 전광판 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ElectricSign'
    post:
      tags: [electric-signs]
      summary: 새 전광판 생성
      description: 새로운 전광판을 시스템에 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElectricSignCreate'
      responses:
        '201':
          description: 전광판 생성 성공
        '400':
          description: 잘못된 요청

  /api/v1/parking/electric-signs/{uid}:
    get:
      tags: [electric-signs]
      summary: 특정 전광판 조회
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: 전광판 고유 ID
      responses:
        '200':
          description: 전광판 정보
        '404':
          description: 전광판을 찾을 수 없음
    put:
      tags: [electric-signs]
      summary: 전광판 정보 업데이트
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElectricSignUpdate'
      responses:
        '200':
          description: 업데이트 성공
        '404':
          description: 전광판을 찾을 수 없음
    delete:
      tags: [electric-signs]
      summary: 전광판 삭제
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 성공
        '404':
          description: 전광판을 찾을 수 없음

  /api/v1/parking/electric-signs/statistics:
    get:
      tags: [electric-signs]
      summary: 전광판 통계 조회
      description: 전광판 사용 통계 및 상태 정보를 조회합니다.
      responses:
        '200':
          description: 전광판 통계 데이터

  /api/v1/parking/electric-signs/health:
    get:
      tags: [electric-signs]
      summary: 전광판 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/parking/electric-signs/info:
    get:
      tags: [electric-signs]
      summary: 전광판 서비스 정보 조회
      responses:
        '200':
          description: 서비스 정보

  /api/v1/parking/electric-signs/legacy:
    get:
      tags: [electric-signs]
      summary: 레거시 전광판 목록 조회
      deprecated: true
      responses:
        '200':
          description: 전광판 목록

  /api/v1/parking/electric-signs/legacy/update:
    post:
      tags: [electric-signs]
      summary: 레거시 전광판 업데이트
      deprecated: true
      responses:
        '200':
          description: 업데이트 완료

  /api/v1/parking/electric-signs/legacy/insert:
    post:
      tags: [electric-signs]
      summary: 레거시 전광판 삽입
      deprecated: true
      responses:
        '200':
          description: 삽입 완료

  /api/v1/parking/electric-signs/legacy/deleteZone:
    post:
      tags: [electric-signs]
      summary: 레거시 전광판 삭제
      deprecated: true
      responses:
        '200':
          description: 삭제 완료

  # ======== 주차장 기본 정보 API (Base Information) ========
