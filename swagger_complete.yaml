  /api/v1/settings/camera-parking/health:
    get:
      tags: [files]
      summary: 카메라 주차 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/settings/camera-parking/info:
    get:
      tags: [files]
      summary: 카메라 주차 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # PABI API (주차 구역 차량 정보)
  /api/v1/parking/pabi/tag:
    post:
      tags: [files]
      summary: 태그로 주차 구역 차량 정보 조회
      requestBody:
        required: true
