          description: 카메라 삭제 성공
        '404':
          description: 카메라를 찾을 수 없음

  /api/v1/cameras/{tag}/image:
    get:
      tags: [cameras]
      summary: 카메라 이미지 조회 ⭐ 핵심 기능
      description: 지정된 카메라의 이미지를 조회합니다. 실제 이미지 파일 또는 URL을 반환합니다.
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
          description: 카메라 태그
      responses:
        '200':
          description: 이미지 조회 성공
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: 이미지를 찾을 수 없음
    patch:
      tags: [cameras]
      summary: 이미지 링크 업데이트 (Shell script용)
      description: Shell script나 외부 프로세스에서 카메라 이미지 URI를 업데이트할 때 사용합니다.
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
