openapi: 3.0.3
info:
  title: 스마트 파킹 백엔드 API - 완전판 (177개 엔드포인트)
  description: |
    ## 🎯 **177개 전체 API 엔드포인트 완전 문서**
    
    이 문서는 실제 구현된 모든 API를 포함하며, 레거시 호환성 API까지 모두 문서화되어 있습니다.
    2025년 11월 4일 기준으로 업데이트된 완전한 API 문서입니다.
    
    ### 📊 카테고리별 API 분포 (실제 구현됨)
    **총 177개 엔드포인트 완전 문서화** ✅
    
    #### 핵심 비즈니스 API (113개)
    - **인증 (Auth)**: 17개 - 로그인, 토큰 관리, 레거시 호환 (최상위 경로 포함)
    - **사용자 관리 (Users)**: 17개 - 계정 CRUD, 비밀번호 관리, 관리자 생성, 레거시 API 6개
    - **파일 & 주차 관리 (Files/Zones/Lots)**: 54개 - 파일 업로드(500MB), 주차 구역 17개, 주차 공간 4개, 파일시스템 4개, 카메라 주차 8개
    - **통계 (Statistics)**: 13개 - 일일/주간/월간/연간 통계, 그래프 데이터, 사용자 정의 기간
    - **전광판 (Electric Signs)**: 13개 - 전광판 CRUD, 통계, 레거시 API 4개
    - **기본 정보 (Base Info)**: 10개 - 주차장 설정, 통계, 전체 정보, 레거시 API 2개
    
    #### 시스템 & 인프라 API (37개)
    - **시스템 모니터링 (System)**: 16개 - 헬스체크, 에러 관리, 서비스 등록, Ping, isAlive
    - **설정 (Settings)**: 11개 - 데이터베이스 관리, 연결 테스트, 시스템 설정
    - **리소스 관리 (Resources)**: 8개 - 주차장 리소스, 주차 공간 목록, 상태 관리
    - **RTSP 캡처**: 13개 - 적응형 배치, 블랙리스트, 이미지 조회, CRUD
    - **카메라 (Simple)**: 8개 - 카메라 CRUD, 이미지 조회, Shell script 지원
    - **엔진 데이터**: 6개 - 실시간 처리, 상태 조회, 통계 트리거
    
    #### UI & 표시 API (27개)
    - **디스플레이**: 7개 - 디스플레이 제어, 일괄 업데이트, 레거시 API
    - **광고판 (Billboard)**: 7개 - 층별 정보, 부분 시스템 제어, 레거시 API
    - **중앙 대시보드 (Central)**: 4개 - 통합 현황, 레거시 API
    - **LED 계산**: 3개 - LED 색상 계산, 레거시 API
    - **차량 정보 (Vehicle)**: 6개 - 태그/번호판 조회, 위치 추적
    
    #### 문서 & 유틸리티 (17개)
    - **Swagger 문서**: 7개 - 다양한 문서 경로, YAML/JSON 스펙
    - **그래프 데이터**: 2개 - 그래프용 통계, 테스트 엔드포인트
    - **레거시 최상위 경로**: 8개 - 하위 호환성 유지를 위한 deprecated API
    
    ## 🔧 기술 스택
    - **백엔드**: Dart (shelf 프레임워크)
    - **데이터베이스**: SQLite (ws4sqlite 통신)
    - **인증**: JWT Bearer Token
    - **파일 관리**: Local File System (최대 500MB 지원)
    - **아키텍처**: 3계층 구조 (모델-서비스-API)
    
    ## 📁 파일 관리 기능
    - **지원 형식**: 이미지, 비디오, 문서, 데이터, 압축 파일 (25+ 확장자)
    - **최대 크기**: 500MB per file
    - **동기화**: 파일시스템-DB 양방향 동기화
    - **메타데이터**: 파일 크기, 타입, 카테고리, MIME 타입 관리
    
    ## 🔄 레거시 호환성
    이 문서는 기존 클라이언트와의 호환성을 위해 레거시 API들도 포함합니다:
    - 최상위 경로 API들 (deprecated)
    - 기존 클라이언트 지원을 위한 레거시 엔드포인트들
    - 점진적 마이그레이션을 위한 병행 운영 API들
    
  version: 3.0.0
  contact:
    name: 스마트 파킹 시스템 지원팀
  license:
    name: MIT

security:
  - BearerAuth: []

tags:
  - name: auth
    description: 인증 및 토큰 관리 (17개) - 로그인, 토큰 관리, 레거시 호환 (최상위 경로 포함)
  - name: users
    description: 사용자 계정 관리 (17개) - 계정 CRUD, 비밀번호 관리, 관리자 생성, 레거시 API 6개
  - name: files
    description: 파일 & 주차 관리 (54개) - 파일 업로드(500MB), 주차 구역 17개, 주차 공간 4개, 파일시스템 4개, 카메라 주차 8개
  - name: statistics
    description: 통계 데이터 분석 (13개) - 일일/주간/월간/연간 통계, 그래프 데이터, 사용자 정의 기간
  - name: electric-signs
    description: 전광판 제어 및 관리 (13개) - 전광판 CRUD, 통계, 레거시 API 4개
  - name: base-info
    description: 주차장 기본 정보 관리 (10개) - 주차장 설정, 통계, 전체 정보, 레거시 API 2개
  - name: cameras
    description: 단순 카메라 관리 (8개) - 카메라 CRUD, 이미지 조회, Shell script 지원
  - name: vehicle
    description: 차량 정보 및 위치 조회 (6개) - 태그/번호판 조회, 위치 추적
  - name: display
    description: 디스플레이 제어 (7개) - 디스플레이 제어, 일괄 업데이트, 레거시 API
  - name: billboard
    description: 광고판 관리 (7개) - 층별 정보, 부분 시스템 제어, 레거시 API
  - name: central
    description: 중앙 대시보드 (4개) - 통합 현황, 레거시 API
  - name: led
    description: LED 계산 (3개) - LED 색상 계산, 레거시 API
  - name: system
    description: 시스템 모니터링 (16개) - 헬스체크, 에러 관리, 서비스 등록, Ping, isAlive
  - name: settings
    description: 시스템 설정 (11개) - 데이터베이스 관리, 연결 테스트, 시스템 설정
  - name: engine
    description: 엔진 데이터 처리 (6개) - 실시간 처리, 상태 조회, 통계 트리거
  - name: utilities
    description: 리소스 관리 및 유틸리티 (17개) - 주차장 리소스 8개, 그래프 데이터 2개, Swagger 문서 7개
  - name: rtsp
    description: RTSP 캡처 관리 (13개) - 적응형 배치, 블랙리스트, 이미지 조회, CRUD

paths:
  # ======== 1. 인증 API (7개 신규 + 10개 레거시) ========
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 사용자 로그인
      description: 계정 정보로 로그인하여 JWT 토큰을 발급받습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, passwd]
              properties:
                account:
                  type: string
                  description: 사용자 계정
                  example: "admin"
                passwd:
                  type: string
                  description: 비밀번호
                  example: "password123"
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Login successful"
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: JWT 액세스 토큰
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                      user:
                        type: object
                        properties:
                          uid:
                            type: integer
                          account:
                            type: string
                          username:
                            type: string
                          userlevel:
                            type: integer
                          isActivated:
                            type: boolean
        '401':
          description: 로그인 실패 (잘못된 계정 정보)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Invalid credentials"
                  errorCode:
                    type: string
                    example: "INVALID_CREDENTIALS"

  /api/v1/auth/base-info:
    get:
      tags: [auth]
      summary: 기본 정보 조회
      description: 로그인 후 주차장 기본 정보를 조회합니다.
      responses:
        '200':
          description: 기본 정보 조회 성공

  /api/v1/auth/token:
    get:
      tags: [auth]
      summary: 토큰 정보 조회
      responses:
        '200':
          description: 토큰 정보

  /api/v1/auth/protected:
    get:
      tags: [auth]
      summary: 보호된 엔드포인트 테스트
      responses:
        '200':
          description: 인증 성공

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: 토큰 갱신
      responses:
        '200':
          description: 토큰 갱신 성공

  /api/v1/auth/health:
    get:
      tags: [auth]
      summary: 인증 서비스 상태 확인
      responses:
        '200':
          description: 서비스 정상

  /api/v1/auth/info:
    get:
      tags: [auth]
      summary: 인증 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # 레거시 인증 API
  /api/v1/auth/accounts/check:
    get:
      tags: [auth]
      summary: 계정 목록 확인
      responses:
        '200':
          description: 계정 확인 성공

  /api/v1/auth/legacy:
    post:
      tags: [auth]
      summary: 레거시 로그인 (기존 클라이언트 호환)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: string
                  description: 계정
                passwd:
                  type: string
                  description: 비밀번호
      responses:
        '200':
          description: 로그인 성공

  /api/v1/auth/legacy/base:
    get:
      tags: [auth]
      summary: 레거시 기본 정보 조회
      responses:
        '200':
          description: 기본 정보 조회 성공

  /api/v1/auth/legacy/jwt:
    get:
      tags: [auth]
      summary: 레거시 JWT 토큰 조회
      responses:
        '200':
          description: JWT 토큰 조회 성공

  /api/v1/auth/legacy/protected:
    get:
      tags: [auth]
      summary: 레거시 보호된 리소스 접근 테스트
      responses:
        '200':
          description: 접근 성공

  /api/v1/auth/status:
    get:
      tags: [auth]
      summary: 로그인 상태 및 기본 정보 조회
      responses:
        '200':
          description: 상태 정보 조회 성공

  /api/v1/auth/status/profile:
    post:
      tags: [auth]
      summary: 사용자 프로필 조회
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account:
                  type: string
                  description: 계정
      responses:
        '200':
          description: 프로필 조회 성공

  # 최상위 레거시 인증 API
  /confirm_account_list:
    get:
      tags: [auth]
      summary: 레거시 계정 목록 확인 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 계정 목록

  /parking_status:
    get:
      tags: [auth]
      summary: 레거시 주차 상태 조회 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 주차 상태 정보

  /login_setting:
    post:
      tags: [auth]
      summary: 레거시 로그인 설정 (최상위 경로)
      deprecated: true
      responses:
        '200':
          description: 로그인 성공

  # ======== 2. 사용자 관리 API (9개 신규 + 2개 레거시) ========
  /api/v1/users:
    get:
      tags: [users]
      summary: 모든 사용자 조회
      responses:
        '200':
          description: 사용자 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        account:
                          type: string
                        username:
                          type: string
                        userlevel:
                          type: integer
                        isActivated:
                          type: integer
    post:
      tags: [users]
      summary: 새 사용자 생성
      description: 새로운 사용자 계정을 생성합니다
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - passwd
                - passwdCheck
                - username
                - userlevel
                - isActivated
              properties:
                account:
                  type: string
                  example: "newuser"
                passwd:
                  type: string
                  example: "password123"
                passwdCheck:
                  type: string
                  example: "password123"
                username:
                  type: string
                  example: "홍길동"
                userlevel:
                  type: integer
                  description: 사용자 레벨 (1=User, 2=Control, 3=Desk, 4=Display)
                  enum: [1, 2, 3, 4]
                  example: 1
                isActivated:
                  type: integer
                  description: 활성화 상태 (0=비활성, 1=활성)
                  enum: [0, 1]
                  example: 1
      responses:
        '201':
          description: 사용자 생성 성공
        '400':
          description: 잘못된 요청 (필수 필드 누락, 비밀번호 불일치 등)
        '409':
          description: 계정이 이미 존재함

  /api/v1/users/{account}:
    get:
      tags: [users]
      summary: 특정 사용자 조회
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 사용자 정보
    put:
      tags: [users]
      summary: 사용자 정보 수정
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: 사용자 이름
                  example: "김철수"
                userlevel:
                  type: integer
                  description: 사용자 레벨 (1=User, 2=Control, 3=Desk, 4=Display)
                  enum: [1, 2, 3, 4]
                  example: 2
                isActivated:
                  type: integer
                  description: 활성화 상태 (0=비활성, 1=활성)
                  example: 1
      responses:
        '200':
          description: 사용자 정보 수정 성공
        '404':
          description: 사용자를 찾을 수 없음
    delete:
      tags: [users]
      summary: 사용자 삭제
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 성공

  /api/v1/users/{account}/password:
    patch:
      tags: [users]
      summary: 비밀번호 변경
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                  description: 현재 비밀번호
                  example: "oldpassword123"
                newPassword:
                  type: string
                  description: 새 비밀번호
                  example: "newpassword123"
                newPasswordCheck:
                  type: string
                  description: 새 비밀번호 확인
                  example: "newpassword123"
              required:
                - currentPassword
                - newPassword
                - newPasswordCheck
      responses:
        '200':
          description: 비밀번호 변경 성공
        '400':
          description: 잘못된 요청 (비밀번호 불일치, 형식 오류 등)
        '401':
          description: 현재 비밀번호가 틀림
        '404':
          description: 사용자를 찾을 수 없음

  /api/v1/users/{account}/password/reset:
    patch:
      tags: [users]
      summary: 비밀번호 초기화
      parameters:
        - name: account
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 비밀번호 초기화 성공

  /api/v1/users/health:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  /api/v1/users/info:
    get:
      tags: [users]
      summary: 사용자 관리 서비스 정보
      responses:
        '200':
          description: 서비스 정보

  # 레거시 사용자 관리 API
  /api/v1/users/legacy:
    get:
      tags: [users]
      summary: 레거시 사용자 목록 조회
      deprecated: true
      responses:
        '200':
          description: 사용자 목록
    post:
      tags: [users]
      summary: 레거시 사용자 생성/업데이트 (통합)
      deprecated: true
