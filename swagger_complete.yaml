        content:
          application/json:
            schema:
              type: object
              properties:
                plate:
                  type: string
                  description: 차량 번호판
      responses:
        '200':
          description: 차량 위치 조회 성공

  # 레거시 주차 구역 API
  /settings_parking_area:
    get:
