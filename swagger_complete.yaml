  # ======== 3. 파일 관리 API (13개 신규 + 12개 확장) ========
  /api/v1/files:
    get:
      tags: [files]
      summary: 모든 주차 구역 조회
      responses:
        '200':
          description: 주차 구역 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        parking_name:
                          type: string
                        file_address:
                          type: string
    post:
      tags: [files]
      summary: 파일 업로드 및 주차 구역 생성 (최대 500MB 지원)
      description: |
        지원되는 파일 형식:
        - **이미지**: jpg, jpeg, png, gif, bmp, webp, tiff, ico
        - **비디오**: mp4, avi, mov, wmv, flv, webm, mkv, mpg, mpeg, m4v, 3gp
        - **문서**: pdf, doc, docx, xls, xlsx, ppt, pptx, txt, csv
        - **데이터**: json, xml, yaml, yml
        - **압축**: zip, rar, 7z, tar, gz
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 업로드할 파일 (최대 500MB)
                filename:
                  type: string
                  description: 파일명 (확장자 포함)
              required:
                - file
                - filename
      responses:
        '201':
          description: 파일 업로드 및 주차 구역 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      filename:
                        type: string
                      fileSize:
                        type: integer
                      fileType:
                        type: string
                      uploadedAt:
                        type: string
                        format: date-time
        '400':
          description: 잘못된 요청 (파일 형식 미지원 등)
        '413':
          description: 파일 크기 초과 (500MB 제한)

  /api/v1/files/{name}:
    get:
      tags: [files]
      summary: 특정 주차 구역 조회
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 주차 구역 정보
    put:
      tags: [files]
      summary: 파일 업데이트 및 주차 구역 업데이트
