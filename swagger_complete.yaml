openapi: 3.0.3
info:
  title: 스마트 파킹 백엔드 API - 완전판
  description: |
    ## 🎯 **177개 전체 API 엔드포인트 완전 문서**
    
    ### 📊 카테고리별 API 분포
    - **통계 (Statistics)**: 26개 - 일일/주간/월간/연간 통계 분석
    - **주차 구역 (Parking Zones)**: 22개 - 구역 및 카메라 관리
    - **사용자 관리 (Users)**: 21개 - 계정 생성, 수정, 삭제
    - **전광판 (Electric Signs)**: 17개 - 전광판 제어 및 관리
    - **기본 정보 (Base Info)**: 11개 - 주차장 기본 설정
    - **인증 (Auth)**: 11개 - 로그인, 토큰 관리
    - **설정 (Settings)**: 11개 - 시스템 설정 관리
    - **시스템 상태 (System)**: 8개 - 모니터링 및 상태 확인
    - **차량 정보 (Vehicle)**: 7개 - 차량 위치 및 상태
    - **디스플레이 (Display)**: 6개 - 디스플레이 제어
    - **광고판 (Billboard)**: 6개 - 광고판 관리
    - **중앙 대시보드 (Central)**: 3개 - 통합 현황
    - **LED 계산 (LED)**: 3개 - LED 색상 계산
    - **엔진 데이터**: 2개 - 실시간 데이터 처리
    - **기타**: 23개 - 유틸리티, 그래프, 리소스 등
    
    ## 🔧 기술 스택
    - **백엔드**: Dart (shelf 프레임워크)
    - **데이터베이스**: SQLite (ws4sqlite 통신)
    - **인증**: JWT Bearer Token
    - **아키텍처**: 3계층 구조 (모델-서비스-API)
    
  version: 2.0.0
  contact:
    name: 스마트 파킹 시스템 지원팀
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: 개발 서버

security:
  - BearerAuth: []

tags:
  - name: statistics
    description: 통계 데이터 분석 (26개 엔드포인트)
  - name: parking-zones
    description: 주차 구역 및 카메라 관리 (22개 엔드포인트)
  - name: electric-signs
    description: 전광판 제어 및 관리 (17개 엔드포인트)
  - name: base-info
    description: 주차장 기본 정보 관리 (11개 엔드포인트)
  - name: vehicle
    description: 차량 정보 및 위치 조회 (7개 엔드포인트)
  - name: display
    description: 디스플레이 제어 (6개 엔드포인트)
  - name: billboard
    description: 광고판 관리 (6개 엔드포인트)
  - name: central
    description: 중앙 대시보드 (3개 엔드포인트)
  - name: led
    description: LED 계산 (3개 엔드포인트)
  - name: system
    description: 시스템 모니터링 (8개 엔드포인트)
  - name: settings
    description: 시스템 설정 (11개 엔드포인트)
  - name: utilities
    description: 기타 유틸리티 (23개 엔드포인트)

paths:
  # ======== 통계 API (26개) ========
  /api/v1/statistics/daily:
    get:
      tags: [statistics]
      summary: 일일 통계
      description: 지정된 날짜의 일일 주차 통계를 조회합니다.
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: 조회할 날짜 (YYYY-MM-DD)
      responses:
        '200':
          description: 일일 통계 데이터

  /api/v1/statistics/daily/all:
    get:
      tags: [statistics]
      summary: 전체 일일 통계
      description: 모든 일일 통계 데이터를 조회합니다.
      responses:
        '200':
          description: 전체 일일 통계

  /api/v1/statistics/weekly:
    get:
      tags: [statistics]
      summary: 주간 통계
      description: 지정된 주의 주간 통계를 조회합니다.
      responses:
        '200':
          description: 주간 통계

  /api/v1/statistics/monthly:
    get:
      tags: [statistics]
      summary: 월간 통계
      description: 지정된 월의 월간 통계를 조회합니다.
      responses:
        '200':
          description: 월간 통계

  /api/v1/statistics/monthly/all:
    get:
      tags: [statistics]
      summary: 전체 월간 통계
      description: 모든 월간 통계 데이터를 조회합니다.
      responses:
        '200':
          description: 전체 월간 통계

  /api/v1/statistics/yearly:
    get:
      tags: [statistics]
      summary: 연간 통계
      description: 연간 통계를 조회합니다.
      responses:
        '200':
          description: 연간 통계

  /api/v1/statistics/yearly/all:
    get:
      tags: [statistics]
      summary: 전체 연간 통계
      responses:
        '200':
          description: 전체 연간 통계

  /api/v1/statistics/several-years:
    get:
      tags: [statistics]
      summary: 다년간 통계
      responses:
        '200':
          description: 다년간 통계

  /api/v1/statistics/several-years/all:
    get:
      tags: [statistics]
      summary: 전체 다년간 통계
      responses:
        '200':
          description: 전체 다년간 통계

  /api/v1/statistics/custom-period:
    post:
      tags: [statistics]
      summary: 커스텀 기간 통계
      description: 사용자 지정 기간의 통계를 조회합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '200':
          description: 커스텀 기간 통계

  /api/v1/statistics/graph:
    post:
      tags: [statistics]
      summary: 그래프 통계 데이터
      description: 그래프 표시용 통계 데이터를 조회합니다.
      responses:
        '200':
          description: 그래프 데이터

  # 레거시 통계 API (13개)
  /statistics/cam_parking_area/oneDayAll:
    get:
      tags: [statistics]
      summary: "[레거시] 전체 일일 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 일일 데이터

  /statistics/cam_parking_area/oneDay:
    get:
      tags: [statistics]
      summary: "[레거시] 일일 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 일일 데이터

  /statistics/cam_parking_area/graphData:
    get:
      tags: [statistics]
      summary: "[레거시] 그래프 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 그래프 데이터

  /statistics/cam_parking_area/oneWeek:
    get:
      tags: [statistics]
      summary: "[레거시] 주간 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 주간 데이터

  /statistics/cam_parking_area/searchDay:
    post:
      tags: [statistics]
      summary: "[레거시] 일자 검색"
      deprecated: true
      responses:
        '200':
          description: 검색 결과

  /statistics/cam_parking_area/searchgraph:
    post:
      tags: [statistics]
      summary: "[레거시] 그래프 검색"
      deprecated: true
      responses:
        '200':
          description: 그래프 검색 결과

  /statistics/cam_parking_area/oneMonthAll:
    get:
      tags: [statistics]
      summary: "[레거시] 전체 월간 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 월간 데이터

  /statistics/cam_parking_area/oneMonth:
    get:
      tags: [statistics]
      summary: "[레거시] 월간 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 월간 데이터

  /statistics/cam_parking_area/oneYearAll:
    get:
      tags: [statistics]
      summary: "[레거시] 전체 연간 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 연간 데이터

  /statistics/cam_parking_area/oneYear:
    get:
      tags: [statistics]
      summary: "[레거시] 연간 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 연간 데이터

  /statistics/cam_parking_area/severalYearsAll:
    get:
      tags: [statistics]
      summary: "[레거시] 전체 다년간 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 다년간 데이터

  /statistics/cam_parking_area/severalYears:
    get:
      tags: [statistics]
      summary: "[레거시] 다년간 데이터"
      deprecated: true
      responses:
        '200':
          description: 레거시 다년간 데이터

  # ======== 주차 구역 관리 API (22개) ========
  /api/v1/parking/zones:
    get:
      tags: [parking-zones]
      summary: 모든 주차 구역 조회
      description: 시스템의 모든 주차 구역 목록을 조회합니다.
      responses:
        '200':
          description: 주차 구역 목록

    post:
      tags: [parking-zones]
      summary: 새 주차 구역 생성
      description: 새로운 주차 구역을 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parking_name:
                  type: string
                  description: 주차장 이름
                file_address:
                  type: string
                  description: 파일 주소
                floor:
                  type: string
                  description: 층 정보
      responses:
        '201':
          description: 주차 구역 생성 성공

  /api/v1/parking/zones/{name}:
    get:
      tags: [parking-zones]
      summary: 특정 주차 구역 조회
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 주차 구역 정보

    put:
      tags: [parking-zones]
      summary: 주차 구역 수정
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 수정 완료

    delete:
      tags: [parking-zones]
      summary: 주차 구역 삭제
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 완료

  /api/v1/parking/cameras:
    get:
      tags: [parking-zones]
      summary: 모든 카메라 조회
      description: 주차장의 모든 카메라 정보를 조회합니다.
      responses:
        '200':
          description: 카메라 목록

    post:
      tags: [parking-zones]
      summary: 새 카메라 추가
      description: 새로운 카메라를 추가합니다.
      responses:
        '201':
          description: 카메라 추가 성공

  /api/v1/parking/cameras/{tag}:
    get:
      tags: [parking-zones]
      summary: 특정 카메라 조회
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 카메라 정보

    put:
      tags: [parking-zones]
      summary: 카메라 정보 수정
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 수정 완료

    delete:
      tags: [parking-zones]
      summary: 카메라 삭제
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 삭제 완료

  # ======== 전광판 API (17개) ========
  /api/v1/electric-signs:
    get:
      tags: [electric-signs]
      summary: 모든 전광판 조회
      description: 시스템의 모든 전광판 목록을 조회합니다.
      responses:
        '200':
          description: 전광판 목록

    post:
      tags: [electric-signs]
      summary: 새 전광판 추가
      description: 새로운 전광판을 추가합니다.
      responses:
        '201':
          description: 전광판 추가 성공

  /api/v1/electric-signs/{uid}:
    get:
      tags: [electric-signs]
      summary: 특정 전광판 조회
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 전광판 정보

    put:
      tags: [electric-signs]
      summary: 전광판 수정
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 수정 완료

    delete:
      tags: [electric-signs]
      summary: 전광판 삭제
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 삭제 완료

  /api/v1/electric-signs/statistics:
    get:
      tags: [electric-signs]
      summary: 전광판 통계
      description: 전광판 사용 통계를 조회합니다.
      responses:
        '200':
          description: 전광판 통계

  # ======== 차량 정보 API (7개) ========
  /api/v1/vehicle/by-tag:
    get:
      tags: [vehicle]
      summary: 태그로 차량 정보 조회
      description: 주차 공간 태그로 차량 정보를 조회합니다.
      parameters:
        - name: tag
          in: query
          required: true
          schema:
            type: string
          description: 주차 공간 태그
      responses:
        '200':
          description: 차량 정보

    post:
      tags: [vehicle]
      summary: 태그로 차량 정보 조회 (POST)
      description: POST 방식으로 태그로 차량 정보를 조회합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tag:
                  type: string
      responses:
        '200':
          description: 차량 정보

  /api/v1/vehicle/by-plate:
    get:
      tags: [vehicle]
      summary: 번호판으로 차량 위치 조회
      description: 차량 번호판으로 주차 위치를 조회합니다.
      parameters:
        - name: plate
          in: query
          required: true
          schema:
            type: string
          description: 차량 번호판
      responses:
        '200':
          description: 차량 위치 정보

    post:
      tags: [vehicle]
      summary: 번호판으로 차량 위치 조회 (POST)
      description: POST 방식으로 번호판으로 차량 위치를 조회합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plate:
                  type: string
      responses:
        '200':
          description: 차량 위치 정보

  /api/v1/vehicle/health:
    get:
      tags: [vehicle]
      summary: 차량 정보 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  # 레거시 차량 정보 API (2개)
  /pabi/tag:
    post:
      tags: [vehicle]
      summary: "[레거시] 태그로 차량 조회"
      deprecated: true
      responses:
        '200':
          description: 차량 정보

  /pabi/car:
    post:
      tags: [vehicle]
      summary: "[레거시] 번호판으로 차량 조회"
      deprecated: true
      responses:
        '200':
          description: 차량 위치

  # ======== 중앙 대시보드 API (3개) ========
  /api/v1/central/dashboard:
    get:
      tags: [central]
      summary: 중앙 대시보드 데이터
      description: 주차장 전체 현황과 통계를 조회합니다.
      responses:
        '200':
          description: 대시보드 데이터
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      statistics:
                        type: object
                        properties:
                          total_spaces:
                            type: integer
                          used_spaces:
                            type: integer
                          available_spaces:
                            type: integer
                          occupancy_rate:
                            type: string

  /api/v1/central/health:
    get:
      tags: [central]
      summary: 중앙 대시보드 서비스 상태
      responses:
        '200':
          description: 서비스 정상

  # 레거시 중앙 API
  /central:
    get:
      tags: [central]
      summary: "[레거시] 중앙 현황"
      deprecated: true
      responses:
        '200':
          description: 중앙 현황

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        errorCode:
          type: string

    ParkingZone:
      type: object
      properties:
        uid:
          type: integer
        parking_name:
          type: string
        file_address:
          type: string
        floor:
          type: string

    Camera:
      type: object
      properties:
        uid:
          type: integer
        tag:
          type: string
        engine_code:
          type: string
        uri:
          type: string

    ElectricSign:
      type: object
      properties:
        uid:
          type: integer
        parking_lot:
          type: string

    VehicleInfo:
      type: object
      properties:
        tag:
          type: string
        plate:
          type: string
        startTime:
          type: string
        point:
          type: string
        floor:
          type: string

  responses:
    Success:
      description: 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse' 