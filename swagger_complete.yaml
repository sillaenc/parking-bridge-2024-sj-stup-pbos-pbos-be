components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BaseInformation:
      type: object
      properties:
        parkingLotName:
          type: string
          description: 주차장 이름
        address:
          type: string
          description: 주차장 주소
        totalSpaces:
          type: integer
          description: 총 주차 공간 수
        availableSpaces:
          type: integer
          description: 사용 가능한 주차 공간 수
        contact:
          type: string
          description: 연락처

    ApiResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object

    ElectricSign:
      type: object
      properties:
        uid:
          type: string
          description: 전광판 고유 ID
        name:
          type: string
          description: 전광판 이름
        location:
          type: string
          description: 설치 위치
        status:
          type: string
          enum: [active, inactive, maintenance]
          description: 전광판 상태
        brightness:
          type: integer
          minimum: 0
          maximum: 100
          description: 밝기 설정

    ElectricSignCreate:
      type: object
      required: [name, location]
      properties:
        name:
          type: string
          description: 전광판 이름
        location:
          type: string
          description: 설치 위치
        brightness:
          type: integer
          minimum: 0
          maximum: 100
          default: 80

    ElectricSignUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]
        brightness:
          type: integer
          minimum: 0
          maximum: 100

    VehicleInfo:
      type: object
      properties:
        vehicleId:
          type: string
          description: 차량 ID
        licensePlate:
          type: string
          description: 차량 번호판
        location:
          type: string
          description: 주차 위치
        entryTime:
          type: string
          format: date-time
          description: 입차 시간
        status:
          type: string
          enum: [parked, exited]
          description: 차량 상태
        errorCode:
          type: string

    ParkingZone:
      type: object
      properties:
        uid:
          type: integer
        parking_name:
          type: string
        file_address:
          type: string
        floor:
          type: string

    Camera:
      type: object
      properties:
        uid:
          type: integer
        tag:
          type: string
        engine_code:
          type: string
        uri:
          type: string

  responses:
    Success:
      description: 성공
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'