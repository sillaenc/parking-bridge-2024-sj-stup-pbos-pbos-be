            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ElectricSign'
    post:
      tags: [electric-signs]
      summary: 새 전광판 생성
      description: 새로운 전광판을 시스템에 등록합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElectricSignCreate'
      responses:
        '201':
          description: 전광판 생성 성공
        '400':
          description: 잘못된 요청

  /api/v1/parking/electric-signs/{uid}:
    get:
      tags: [electric-signs]
      summary: 특정 전광판 조회
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
          description: 전광판 고유 ID
      responses:
        '200':
          description: 전광판 정보
        '404':
          description: 전광판을 찾을 수 없음
    put:
      tags: [electric-signs]
      summary: 전광판 정보 업데이트
      parameters:
        - name: uid
          in: path
          required: true
          schema:
            type: string
